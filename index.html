<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASTRONEX (ASTN) PARALLAX v2.1.4</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --astn-main: #00FFCC;
            --astn-dim: rgba(0, 255, 204, 0.15);
            --hmd-red: #FF0000;
        }

        body { margin: 0; padding: 0; background-color: #000; color: var(--astn-main); font-family: 'JetBrains Mono', monospace; overflow: hidden; -webkit-user-select: none; user-select: none; }

        /* ── HMD Optics ── */
        .scanline { position: fixed; width: 100%; height: 100%; pointer-events: none; background: repeating-linear-gradient(transparent, transparent 2px, rgba(0, 255, 204, 0.02) 3px); z-index: 100; opacity: 0.5; }
        .grid-bg { position: fixed; width: 100%; height: 100%; background-image: linear-gradient(var(--astn-dim) 1px, transparent 1px), linear-gradient(90deg, var(--astn-dim) 1px, transparent 1px); background-size: 60px 60px; background-position: center; opacity: 0.15; z-index: 1; }

        .reticle { position: fixed; width: 30px; height: 30px; border: 2px solid var(--astn-main); pointer-events: none; z-index: 50; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .tl { top: 30px; left: 30px; border-right: none; border-bottom: none; }
        .tr { top: 30px; right: 30px; border-left: none; border-bottom: none; }
        .bl { bottom: 30px; left: 30px; border-right: none; border-top: none; }
        .br { bottom: 30px; right: 30px; border-left: none; border-top: none; }

        body.mode-nightscape { --astn-main: #FF8C00; --astn-dim: rgba(255, 140, 0, 0.1); }
        body.mode-nightscape .reticle { width: 50px; height: 50px; border-width: 1px; }

        #camera-preview { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; filter: brightness(0.7) contrast(1.1); display: none; }
        #ar-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; display: none; }

        #ui-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 60; padding: 40px; box-sizing: border-box; pointer-events: none; display: none; flex-direction: column; justify-content: space-between; }
        .reliability-box { border-left: 2px solid var(--astn-main); padding-left: 15px; }
        #scene-indicator { font-size: 10px; letter-spacing: 3px; padding: 2px 10px; background: var(--astn-main); color: #000; font-weight: bold; margin-bottom: 10px; display: inline-block; }

        .stacking-only { opacity: 0; transition: opacity 0.3s; }
        .stacking-active .stacking-only { opacity: 1; }

        #control-panel { position: fixed; bottom: 40px; right: 40px; z-index: 70; pointer-events: auto; background: rgba(0, 10, 10, 0.85); border: 1px solid var(--astn-main); padding: 15px; backdrop-filter: blur(8px); }
        button, select { background: transparent; color: var(--astn-main); border: 1px solid var(--astn-main); padding: 8px 12px; cursor: pointer; font-family: inherit; font-size: 11px; }

        #convergence-ring { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 20; display: none; }

        /* Overlays */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 150; pointer-events: auto; }
        .ob-step { display: none; text-align: center; max-width: 300px; }
        .ob-step.active { display: flex; flex-direction: column; gap: 20px; }

        #boot-splash { position: fixed; width: 100%; height: 100%; z-index: 200; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; }
        #initBtn { border: 1px solid var(--hmd-red); padding: 20px 60px; color: var(--hmd-red); background: transparent; cursor: pointer; letter-spacing: 5px; opacity: 0; transition: 0.5s; }
        .fadeOut { opacity: 0 !important; transition: opacity 1s; pointer-events: none; }
    </style>
</head>
<body class="idle">
    <div class="scanline"></div><div class="grid-bg"></div>
    <div class="reticle tl"></div><div class="reticle tr"></div>
    <div class="reticle bl"></div><div class="reticle br"></div>

    <video id="camera-preview" autoplay playsinline muted></video>
    <canvas id="ar-canvas"></canvas>

    <div id="ui-layer">
        <div class="hud-header">
            <div class="reliability-box">
                <div id="scene-indicator">ASTRO MODE</div>
                <div id="reliability-score" class="stacking-only" style="font-size:16px; font-weight:600;">AQI: 0.00%</div>
                <div id="stack-counter" class="stacking-only" style="font-size:9px;">STACK: 0.0s / 300s</div>
                <div id="sqm-display" style="font-size:9px; margin-top:5px; opacity:0.7;">SQM: ANALYZING...</div>
            </div>
            <div id="time-display" style="font-size:11px; position:fixed; top:40px; right:40px;">UTC 00:00:00</div>
        </div>
    </div>

    <div id="convergence-ring">
        <svg width="140" height="140" viewBox="-70 -70 140 140">
            <circle r="60" fill="none" stroke="var(--astn-dim)" stroke-width="1"/>
            <circle id="ring-progress" r="60" fill="none" stroke="var(--astn-main)" stroke-width="3" stroke-dasharray="377" stroke-dashoffset="377" transform="rotate(-90)"/>
            <text id="ring-aqi" y="6" text-anchor="middle" fill="var(--astn-main)" font-size="16" font-weight="600">&#8212;</text>
        </svg>
    </div>

    <div id="onboarding-overlay" class="overlay">
        <div class="ob-step active" id="ob-step-1">
            <div style="font-size:40px;">&#127756;</div>
            <div style="font-weight:600; letter-spacing:3px;">AIM AT SKY</div>
            <div style="font-size:12px; color:rgba(0,255,204,0.7);">&#31278;&#26411;&#12434;&#31354;&#12395;&#21521;&#12369;&#12289;&#38745;&#27490;&#12375;&#12390;&#12367;&#12384;&#12373;&#12356;&#12290;</div>
            <button onclick="_obNext(2)">NEXT &#8594;</button>
        </div>
        <div class="ob-step" id="ob-step-2">
            <div style="font-size:40px;">&#9989;</div>
            <div style="font-weight:600; letter-spacing:3px;">READY</div>
            <div style="font-size:12px; color:rgba(0,255,204,0.7);">&#35373;&#23450;&#23436;&#20102;&#12290;&#35266;&#27979;&#12434;&#38283;&#22987;&#12375;&#12414;&#12377;&#12290;</div>
            <button onclick="_obFinish()">START</button>
        </div>
    </div>

    <div id="mode-select-overlay" class="overlay">
        <div style="font-size:12px; letter-spacing:5px; margin-bottom:20px;">SYSTEM SELECTION</div>
        <button onclick="ASTN.setScene('astro')" style="width:280px; padding:25px;">&#11088; ASTRO MODE</button>
        <button onclick="ASTN.setScene('nightscape')" style="width:280px; padding:25px; border-color:#FF8C00; color:#FF8C00;">&#127750; NIGHTSCAPE MODE</button>
    </div>

    <div id="control-panel">
        <div style="display:flex; gap:8px; margin-bottom:15px; border-bottom:1px solid var(--astn-dim); padding-bottom:10px;">
            <button onclick="ASTN.openModeSelect()">MODE</button>
            <button id="btn-stack" onclick="ASTN.toggleStacking()" style="font-weight:600;">START STACK</button>
            <button onclick="ASTN.screenOff()">&#127769;</button>
        </div>
        <div id="panel-astro">
            <select id="star-select" style="width:100%; margin-bottom:8px;">
                <option value="Polaris">Polaris</option><option value="Sirius">Sirius</option>
            </select>
            <button onclick="ASTN.register()" style="width:100%;">REGISTER TARGET&#9733;</button>
        </div>
        <div id="panel-nightscape" style="display:none;">
            <button onclick="ASTN.compute()" style="width:100%;">ALIGN HORIZON</button>
        </div>
    </div>

    <div id="boot-splash">
        <div style="font-size:80px; letter-spacing:20px; color:var(--hmd-red); font-weight:600;">ASTN</div>
        <div id="etymology" style="margin:30px 0; font-size:11px; color:var(--hmd-red); text-align:center;"></div>
        <button id="initBtn">INITIALIZE HARDWARE LINK</button>
    </div>

    <script>
    (function() {
        const ASTN = {
            state: { mode: 'astro', isStacking: false, stackTime: 0, lastShake: 0 },
            boot: async function() {
                const vid = document.getElementById('camera-preview');
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                    vid.srcObject = stream; vid.style.display = 'block';
                } catch(e) { console.error(e); }
                document.getElementById('ar-canvas').style.display = 'block';
                document.getElementById('ui-layer').style.display = 'flex';
                document.getElementById('control-panel').style.display = 'block';

                // v2.1.0 Onboarding check
                if(!localStorage.getItem('astn_ob_done')) {
                    setTimeout(() => { document.getElementById('onboarding-overlay').style.display = 'flex'; }, 500);
                }
                this.startEngines();
            },
            setScene: function(m) {
                this.state.mode = m;
                document.getElementById('mode-select-overlay').style.display = 'none';
                document.body.className = 'mode-' + m;
                document.getElementById('scene-indicator').textContent = m.toUpperCase() + " MODE";
                document.getElementById('panel-astro').style.display = (m==='astro'?'block':'none');
                document.getElementById('panel-nightscape').style.display = (m==='nightscape'?'block':'none');
            },
            openModeSelect: function() { document.getElementById('mode-select-overlay').style.display = 'flex'; },
            toggleStacking: function() {
                this.state.isStacking = !this.state.isStacking;
                const btn = document.getElementById('btn-stack');
                document.getElementById('convergence-ring').style.display = this.state.isStacking ? 'block' : 'none';
                document.body.classList.toggle('stacking-active', this.state.isStacking);
                btn.textContent = this.state.isStacking ? "STOP STACK" : "START STACK";
                if(this.state.isStacking) this.state.stackTime = 0;
            },
            startEngines: function() {
                setInterval(() => {
                    document.getElementById('time-display').textContent = `UTC ${new Date().toISOString().slice(11,19)}`;
                    if(this.state.isStacking) {
                        this.state.stackTime += 0.5;
                        const stab = Math.max(0, 100 - (this.state.lastShake * 500));
                        const aqi = (stab * 0.7) + (Math.min(100, (this.state.stackTime/300)*100) * 0.3);
                        document.getElementById('reliability-score').textContent = `AQI: ${aqi.toFixed(2)}%`;
                        document.getElementById('stack-counter').textContent = `STACK: ${this.state.stackTime.toFixed(1)}s / 300s`;
                        document.getElementById('ring-progress').style.strokeDashoffset = 377 - (377 * (this.state.stackTime % 10) / 10);
                        document.getElementById('ring-aqi').textContent = Math.floor(aqi) + "%";
                    }
                }, 500);
                window.addEventListener('devicemotion', (e) => {
                    const a = e.accelerationIncludingGravity;
                    if(a) this.state.lastShake = Math.abs(a.x)+Math.abs(a.y)+Math.abs(a.z)-9.8;
                });
            },
            screenOff: function() { document.body.style.opacity = (document.body.style.opacity==='0.2'?'1':'0.2'); },
            register: function() { alert("Target Locked"); },
            compute: function() { alert("Computing..."); }
        };
        window.ASTN = ASTN;
        window._obNext = (s) => { document.querySelectorAll('.ob-step').forEach(e=>e.classList.remove('active')); document.getElementById('ob-step-'+s).classList.add('active'); };
        window._obFinish = () => { localStorage.setItem('astn_ob_done', 'true'); document.getElementById('onboarding-overlay').style.display = 'none'; };

        document.getElementById('initBtn').addEventListener('click', async () => {
            if(typeof DeviceOrientationEvent!=='undefined' && typeof DeviceOrientationEvent.requestPermission==='function') await DeviceOrientationEvent.requestPermission();
            document.getElementById('boot-splash').classList.add('fadeOut');
            setTimeout(() => { document.getElementById('boot-splash').style.display='none'; ASTN.boot(); }, 1000);
        });
        (async function() {
            const container = document.getElementById('etymology');
            const lines = ["HARDWARE_LINK", "QUATERNION_SYNC", "STARDUST_DB_LOAD"];
            for (let l of lines) {
                container.innerHTML += `<div>${l} ... [OK]</div>`;
                await new Promise(r => setTimeout(r, 220));
            }
            document.getElementById('initBtn').style.opacity = '1';
        })();
    })();
    </script>
</body>
</html>
