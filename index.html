<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS v23 - RELAXED</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <style>
        :root { --c:#0ff; --g:#0f8; --a:#fc0; --bg:#000; }
        body { margin:0; overflow:hidden; background:#000; color:var(--c); font-family: monospace; touch-action:none; }
        
        #ar-canvas { position:fixed; inset:0; z-index:10; }
        #vfx-layer { position:fixed; inset:0; z-index:25; pointer-events:none; 
            background: repeating-linear-gradient(0deg, rgba(0,255,255,0.03) 0px, transparent 1px, transparent 3px); }

        #calc-matrix {
            position: fixed; inset: 0; z-index: 15;
            font-size: 9px; color: rgba(0, 255, 128, 0.2);
            pointer-events: none; overflow: hidden; padding: 10px;
        }
        .matrix-line { animation: slideUp 1s linear forwards; }
        @keyframes slideUp { from { transform: translateY(100vh); } to { transform: translateY(-10vh); } }

        #boot-overlay { 
            position:fixed; inset:0; z-index:100; 
            background:rgba(0,10,20,0.98); padding:25px; 
            display:flex; flex-direction:column; align-items:center; justify-content:center; 
        }
        #console { width:100%; flex:1; overflow:auto; font-size:11px; margin-bottom:20px; border:1px solid rgba(0,255,255,0.2); padding:10px; background:rgba(0,0,0,0.5); }
        .log { margin-bottom:4px; border-left: 2px solid var(--c); padding-left: 8px; }
        #start-btn { width:90%; padding:20px; background:rgba(0,255,128,0.1); border:2px solid var(--g); color:var(--g); font-size:18px; font-weight:bold; cursor:pointer; }

        #calib-hud { position:fixed; inset:0; z-index:50; display:none; flex-direction:column; align-items:center; justify-content:center; pointer-events:none; }
        .reticle-container { position:relative; width:260px; height:260px; }
        .zenith-reticle { 
            position:absolute; inset:0; border:1px dashed rgba(0,255,255,0.2); border-radius:50%; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .zenith-reticle.active { border:2px solid var(--g); transform:scale(1.1); box-shadow: 0 0 40px rgba(0,255,128,0.4); }

        #guide-dot {
            position:absolute; width:24px; height:24px; background:var(--a); border-radius:50%;
            left:50%; top:50%; margin:-12px 0 0 -12px;
            box-shadow: 0 0 20px var(--a); will-change: transform;
        }

        #status-display { text-align:center; margin-top:30px; min-height:80px; }
        #main-msg { font-size:26px; color:var(--a); font-weight:bold; letter-spacing:2px; }
        #sub-msg { font-size:12px; color:var(--c); opacity:0.7; }
        
        .progress-box { width:240px; height:3px; background:rgba(0,255,255,0.1); margin-top:20px; }
        #bar { height:100%; background:var(--g); width:0%; transition: width 0.1s; }
    </style>
</head>
<body>

<canvas id="ar-canvas"></canvas>
<div id="vfx-layer"></div>
<div id="calc-matrix"></div>

<div id="boot-overlay">
    <div style="font-size:22px; letter-spacing:10px; margin-bottom:20px; font-weight:bold;">NEXUS v23</div>
    <div id="console"></div>
    <button id="start-btn">CORE START</button>
</div>

<div id="calib-hud">
    <div class="reticle-container">
        <div id="reticle" class="zenith-reticle"></div>
        <div id="guide-dot"></div>
    </div>
    <div id="status-display">
        <div id="main-msg">STANDBY</div>
        <div id="sub-msg">Awaiting Sky Alignment</div>
    </div>
    <div class="progress-box"><div id="bar"></div></div>
</div>

<script>
/** * --- NEXUS CORE (User-Friendly Adjusted) ---
 */
const Core = {
    bias: { x: 0, y: 0 },
    last: { b: null, g: null },
    trueHeading: 0,
    currentPos: { x: 0, y: 0 },
    
    // 1. 輝度サンプリング (Median)
    getLumi: (data) => {
        let v = [];
        for(let i=0; i<data.length; i+=4) {
            let b = (data[i]+data[i+1]+data[i+2])/3;
            if(b < 252) v.push(b);
        }
        if(!v.length) return 0;
        v.sort((a,b)=>a-b);
        return v[Math.floor(v.length/2)];
    },

    // 2. ドリフト補正 (Static Bias Removal)
    applyDrift: (b, g) => {
        if(Core.last.b === null) { Core.last = {b,g}; return {b,g}; }
        const dB = b - Core.last.b, dG = g - Core.last.g;
        // 静止判定を少し甘くして補正を効きやすくする
        if(Math.abs(dB) < 0.05) Core.bias.y += dB * 0.03;
        if(Math.abs(dG) < 0.05) Core.bias.x += dG * 0.03;
        Core.last = {b,g};
        return { b: b - Core.bias.y, g: g - Core.bias.x };
    },

    // 3. 地磁気フュージョン
    fuseHeading: (mag, k=0.92) => { // コンパスの比率を少し上げて追従性UP
        let diff = mag - Core.trueHeading;
        if(diff > 180) diff -= 360; if(diff < -180) diff += 360;
        Core.trueHeading += diff * (1 - k);
        return Core.trueHeading;
    },

    // 4. スムージング (Lerp - 反応速度UP版)
    smooth: (cur, tar, f=0.25) => cur + (tar - cur) * f // 0.15 -> 0.25へ
};

let scene, camera, renderer, stars, zenithOK = false, isCalib = false, hasVib = false, magHead = 0;
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);

function log(t, c="") {
    const d = document.createElement("div"); d.className = "log "+c; d.textContent = ">> "+t;
    document.getElementById("console").appendChild(d);
}

function playPing() {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const o = ctx.createOscillator(); const g = ctx.createGain();
        o.type = 'sine'; o.frequency.setValueAtTime(880, ctx.currentTime);
        o.frequency.exponentialRampToValueAtTime(1760, ctx.currentTime + 0.1);
        g.gain.setValueAtTime(0.05, ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
        o.connect(g); g.connect(ctx.destination); o.start(); o.stop(ctx.currentTime + 0.1);
    } catch(e){}
}

function initAR() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({canvas:document.getElementById('ar-canvas'), alpha:true, antialias:true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    const geo = new THREE.BufferGeometry(); const pos = [];
    for(let i=0; i<3000; i++) pos.push((Math.random()-0.5)*200, (Math.random()-0.5)*200, (Math.random()-0.5)*200);
    geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
    stars = new THREE.Points(geo, new THREE.PointsMaterial({color:0xffffff, size:0.25, opacity:0, transparent:true}));
    scene.add(stars); animate();
}

function animate() {
    requestAnimationFrame(animate);
    const dot = document.getElementById("guide-dot");
    if(dot) {
        dot.style.transform = `translate(${Core.currentPos.x}px, ${Core.currentPos.y}px)`;
        dot.style.background = zenithOK ? "var(--g)" : "var(--a)";
    }
    renderer.render(scene, camera);
}

window.addEventListener('deviceorientationabsolute', (e) => {
    magHead = e.webkitCompassHeading || (360 - e.alpha);
}, true);

function onOrientation(e) {
    if(e.alpha === null) return;
    const comp = Core.applyDrift(e.beta, e.gamma);
    const head = Core.fuseHeading(magHead);
    
    camera.rotation.set(THREE.MathUtils.degToRad(comp.b), THREE.MathUtils.degToRad(360 - head), THREE.MathUtils.degToRad(-comp.g), 'YXZ');

    // --- センター移動のストレス解消 (感度UP) ---
    const tx = Math.max(-130, Math.min(130, comp.g * 2.2));
    const ty = Math.max(-130, Math.min(130, (comp.b + 90) * 2.2));
    Core.currentPos.x = Core.smooth(Core.currentPos.x, tx);
    Core.currentPos.y = Core.smooth(Core.currentPos.y, ty);

    // --- 天頂判定の「適当」化 (判定を50度まで拡大) ---
    const bErr = Math.abs(comp.b + 90), gErr = Math.abs(comp.g);
    zenithOK = (Math.sqrt(bErr**2 + gErr**2) < 50); // 30度から50度へ大幅緩和
    
    if(!isCalib) {
        const ret = document.getElementById("reticle"), main = document.getElementById("main-msg");
        if(zenithOK) {
            if(!hasVib) { playPing(); if(!isIOS && navigator.vibrate) navigator.vibrate(40); hasVib = true; }
            ret.classList.add("active"); main.textContent = "READY"; main.style.color = "var(--g)";
        } else {
            hasVib = false; ret.classList.remove("active");
            main.textContent = "SCANNING"; main.style.color = "var(--a)";
        }
    }
}

document.getElementById('start-btn').addEventListener('click', async () => {
    log("システム初期化中...");
    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        const res = await DeviceOrientationEvent.requestPermission();
        if (res === 'granted') window.addEventListener("deviceorientation", onOrientation, true);
    } else { window.addEventListener("deviceorientation", onOrientation, true); }
    try {
        const stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: "environment"}});
        log("光学同期：完了", "ok"); startCalibration(stream);
    } catch (e) { log("エラー: " + e.message, "warn"); }
});

function startCalibration(stream) {
    document.getElementById("boot-overlay").style.display = "none";
    document.getElementById("calib-hud").style.display = "flex";
    const v = document.createElement("video"); v.srcObject = stream; v.play();
    const c = document.createElement("canvas"); const ctx = c.getContext("2d");
    const matrix = document.getElementById("calc-matrix");
    let samples = [];

    const loop = setInterval(() => {
        if(!zenithOK) return;
        isCalib = true;
        document.getElementById("main-msg").textContent = "ANALYZING";
        c.width = 40; c.height = 40; ctx.drawImage(v, 0, 0, 40, 40);
        const lumi = Core.getLumi(ctx.getImageData(0,0,40,40).data);
        samples.push(lumi);
        document.getElementById("bar").style.width = samples.length + "%";

        const line = document.createElement("div"); line.className = "matrix-line";
        line.textContent = `B:[${Core.bias.x.toFixed(2)},${Core.bias.y.toFixed(2)}] H:${Math.round(Core.trueHeading)}° LUM:${lumi.toFixed(1)}`;
        matrix.appendChild(line);
        if(matrix.childNodes.length > 40) matrix.removeChild(matrix.firstChild);

        if(samples.length >= 100) {
            clearInterval(loop);
            finalize(samples.reduce((a,b)=>a+b)/samples.length);
        }
    }, 45);
}

function finalize(lumi) {
    document.getElementById("main-msg").textContent = "COMPLETE";
    let op = 0; const targetAlpha = Math.max(0.3, 1 - (lumi/180));
    const reveal = setInterval(() => {
        op += 0.05; stars.material.opacity = op * targetAlpha;
        if(op >= 1) { clearInterval(reveal); setTimeout(() => { document.getElementById("calib-hud").style.opacity = "0"; }, 800); }
    }, 50);
}

window.onload = () => { initAR(); log("NEXUS v23 SYSTEM STANDBY."); };
</script>
</body>
</html>
