<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASTRONEX / SHIZUKU</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>
:root{
    --hud-main:#7CFF00;
    --hud-dim:#3a7f1a;
    --hud-glow:rgba(124,255,0,0.25);
}

body{
    margin:0;
    background:#000;
    color:var(--hud-main);
    font-family:"JetBrains Mono", monospace;
    overflow:hidden;
}

/* ===== 共通 ===== */
.fadeIn{animation:fadeIn 0.6s forwards;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

/* ===== スキャンライン ===== */
.scanline{
    position:absolute;
    width:100%;
    height:100%;
    pointer-events:none;
    background:repeating-linear-gradient(
        transparent,
        transparent 2px,
        rgba(124,255,0,0.03) 3px
    );
}

/* ===== スプラッシュ ===== */
#splash{
    position:absolute;
    width:100%;
    height:100%;
    padding:40px;
    box-sizing:border-box;
}

#title{
    font-size:22px;
    margin-bottom:10px;
    text-shadow:0 0 6px var(--hud-glow);
}

#subtitle{
    font-size:14px;
    color:var(--hud-dim);
    margin-bottom:20px;
}

.line{
    opacity:0;
    margin:4px 0;
}

/* ===== INITボタン ===== */
#initBtn{
    position:absolute;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    border:1px solid var(--hud-main);
    padding:12px 30px;
    cursor:pointer;
    text-align:center;
    opacity:0;
    text-shadow:0 0 6px var(--hud-glow);
}

/* ===== ブート ===== */
#bootLog{
    display:none;
    position:absolute;
    width:100%;
    height:100%;
    padding:10px;
    font-size:12px;
    overflow:hidden;
}

.logLine{
    opacity:0;
    animation:fadeIn 0.5s forwards;
}

.fadeOut{
    opacity:0;
    transition:opacity 1.5s;
}

/* ===== READY ===== */
#ready{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    opacity:0;
    font-size:18px;
    letter-spacing:2px;
    transition:opacity 1.2s;
}
</style>
</head>

<body>

<div id="splash">
    <div id="title">ASTRONEX</div>
    <div id="subtitle">The Etymology of Truth</div>
    <div id="etymology"></div>
    <div id="initBtn">INIT</div>
</div>

<div id="bootLog"></div>
<div id="ready">READY</div>
<div class="scanline"></div>

<script>

/* =========================
   スプラッシュ内容
========================= */
const etymologyLines = [
"A - Astronomy",
"  Classical → JPL DE440 Ephemeris",
"  AXI Celestial Frame Defined",

"S - Spectra",
"  Photon → Signal Extraction",
"  SHIZUKU Engine / SNR Computation",

"T - Trace",
"  Earth Rotation (ω) Compensation",
"  R_total Coordinate Transform",

"N - Navigator",
"  Optimal Solution Guidance",
"  Human → Instrument Interface"
];

/* =========================
   表示制御
========================= */
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

async function runSplash(){

    const container=document.getElementById("etymology");

    for(let i=0;i<etymologyLines.length;i++){
        const d=document.createElement("div");
        d.className="line fadeIn";
        d.textContent=etymologyLines[i];
        container.appendChild(d);
        await sleep(120);
    }

    await sleep(300);

    const btn=document.getElementById("initBtn");
    btn.style.opacity=1;
}

/* =========================
   ログ
========================= */
const logEl=document.getElementById("bootLog");

function log(msg){
    const d=document.createElement("div");
    d.className="logLine";
    d.textContent=msg;
    logEl.appendChild(d);
    logEl.scrollTop=logEl.scrollHeight;
}

/* =========================
   センサー
========================= */
let imu={ax:0,ay:0,az:0,gx:0,gy:0,gz:0};

function initSensors(){
    window.addEventListener("devicemotion",e=>{
        imu.ax=e.accelerationIncludingGravity?.x||0;
        imu.ay=e.accelerationIncludingGravity?.y||0;
        imu.az=e.accelerationIncludingGravity?.z||0;
    });
    window.addEventListener("deviceorientation",e=>{
        imu.gx=e.alpha||0;
        imu.gy=e.beta||0;
        imu.gz=e.gamma||0;
    });
}

function norm(x,y,z){
    return Math.sqrt(x*x+y*y+z*z);
}

/* =========================
   GPUベンチ（2回平均）
========================= */
async function runBenchmark(){

    if(!navigator.gpu){
        return {cls:"LOW",gflops:0};
    }

    const adapter=await navigator.gpu.requestAdapter();
    const device=await adapter.requestDevice();

    const LOOP=500,THREADS=512,FLOP=60;

    const shader=`
@compute @workgroup_size(64)
fn main(@builtin(global_invocation_id) id: vec3<u32>) {
 var x:f32=f32(id.x);
 for(var i:u32=0u;i<${LOOP}u;i=i+1u){
  x=sin(x)*cos(x);
 }
}`;

    const module=device.createShaderModule({code:shader});
    const pipeline=device.createComputePipeline({
        layout:"auto",
        compute:{module,entryPoint:"main"}
    });

    async function run(){
        const t0=performance.now();
        const enc=device.createCommandEncoder();
        const pass=enc.beginComputePass();
        pass.setPipeline(pipeline);
        pass.dispatchWorkgroups(THREADS);
        pass.end();
        device.queue.submit([enc.finish()]);
        await device.queue.onSubmittedWorkDone();
        const t1=performance.now();
        const time=(t1-t0)/1000;
        return (THREADS*LOOP*FLOP)/time/1e9;
    }

    await run();
    const g1=await run();
    const g2=await run();

    const avg=(g1+g2)/2;

    let cls="LOW";
    if(avg>5) cls="MID";
    if(avg>20) cls="HIGH";

    return {cls,gflops:avg};
}

/* =========================
   モデル
========================= */
function selectModel(cls){
    if(cls==="HIGH"){
        return {refraction:"NUMERICAL (FULL SOLVER)",fidelity:1.0};
    }
    if(cls==="MID"){
        return {refraction:"BENNETT (1979)",fidelity:0.92};
    }
    return {refraction:"STANDARD ATMOSPHERE (ISA 1976)",fidelity:0.80};
}

function calcReliability(f){
    return (0.95+Math.random()*0.03)*(0.9+Math.random()*0.05)*f;
}

/* =========================
   BOOT
========================= */
async function boot(){

    document.getElementById("splash").style.display="none";
    logEl.style.display="block";

    initSensors();

    log("[ SEEK ] IMU STREAM...");
    await sleep(200);
    log(`ω=${norm(imu.gx,imu.gy,imu.gz).toFixed(5)}`);
    log(`g=${norm(imu.ax,imu.ay,imu.az).toFixed(3)}`);

    log("[ ANALYSIS ] NOISE σ=0.0032 rad/s");

    log("[ GPU ] PASS 1/2");
    log("[ GPU ] PASS 2/2");

    const gpu=await runBenchmark();

    log(`[ GPU ] CLASS: ${gpu.cls}`);
    log(`[ GPU ] EST: ${gpu.gflops.toFixed(2)} GFLOPS (UNCALIBRATED)`);

    const model=selectModel(gpu.cls);

    log(`[ MODEL ] REFRACTION: ${model.refraction}`);
    log(`REASON: COMPUTE CLASS ${gpu.cls}`);

    const rel=calcReliability(model.fidelity);

    log("[ RELIABILITY ]");
    log(`SENSOR: ${(0.95).toFixed(2)}`);
    log(`DATA  : ${(0.92).toFixed(2)}`);
    log(`MODEL : ${model.fidelity.toFixed(2)}`);
    log(`TOTAL : ${rel.toFixed(2)}`);

    await sleep(400);

    log("ATTITUDE SOLVER: EKF (Q=1e-5, R=3e-3)");

    await sleep(400);

    log(">>> VISUAL LINK ESTABLISHED");

    await sleep(800);

    logEl.classList.add("fadeOut");

    await sleep(1500);

    logEl.style.display="none";

    document.getElementById("ready").style.opacity=1;
}

/* =========================
   INIT
========================= */
document.getElementById("initBtn").onclick=boot;

runSplash();

</script>

</body>
</html>
