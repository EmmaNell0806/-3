<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ASTRONEX [ASTN] - ZENITH:ZERO</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root { --c:#0ff; --g:#0f8; --a:#fc0; --r:#f33; --panel: rgba(0,8,15,0.95); }
body { margin:0; overflow:hidden; background:#000; color:var(--c); font-family:'Share Tech Mono', monospace; user-select:none; }
body.night-mode { --c:#f00; --g:#f00; --a:#f00; color:#f00; }

#lumi-video { position:fixed; inset:0; width:100%; height:100%; object-fit:cover; z-index:1; opacity:0.25; filter: grayscale(1) contrast(1.2); }
#matrix-canvas { position:fixed; inset:0; z-index:2; opacity:0.6; pointer-events:none; }

#boot-screen { position:fixed; inset:0; z-index:200; display:flex; flex-direction:column; background:#000; transition: 1s; }
.mode-select { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; border:1px solid rgba(0,255,255,0.05); cursor:pointer; }
.mode-select:active { background: rgba(0,255,255,0.1); }

#hud-overlay { position:fixed; inset:0; z-index:100; display:none; }

.gauge-container { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); width: 280px; height: 280px; }
.gauge-ring { fill: none; stroke-width: 3; stroke-linecap: round; transform: rotate(-90deg); transform-origin: 50% 50%; transition: 0.3s; }
#space-ring { stroke: var(--c); stroke-dasharray: 565; }
#light-ring { stroke: #f0f; stroke-dasharray: 500; }

#sync-progress-container { position: fixed; bottom: 80px; left: 10%; width: 80%; height: 4px; background: rgba(0,255,255,0.1); }
#sync-progress-bar { width: 0%; height: 100%; background: var(--c); box-shadow: 0 0 15px var(--c); transition: 0.2s; }

#status-panel { position:fixed; bottom:120px; width:100%; text-align:center; }
#sqi-val { font-size:64px; font-weight:bold; }
#guide-msg { font-size:14px; letter-spacing:2px; margin-top:10px; color: var(--a); }
#sub-guide { font-size:9px; opacity:0.7; margin-top:5px; height: 12px; }
</style>
</head>
<body>

<video id="lumi-video" autoplay playsinline muted></video>
<canvas id="lumi-canvas" style="display:none;"></canvas>
<canvas id="matrix-canvas"></canvas>

<div id="boot-screen">
    <div class="mode-select" onclick="startSequence('NORMAL')">
        <div style="font-size:24px; letter-spacing:8px;">STANDARD SYNC</div>
        <div style="font-size:10px; margin-top:10px;">[ 通常モード：環境解析とARナビゲーションを開始 ]</div>
    </div>
    <div class="mode-select" onclick="startSequence('NIGHT')" style="color:#f00;">
        <div style="font-size:24px; letter-spacing:8px;">NIGHT VISION</div>
        <div style="font-size:10px; margin-top:10px;">[ 赤色モード：暗順応を保護し観測を継続 ]</div>
    </div>
</div>

<div id="hud-overlay">
    <div class="gauge-container">
        <svg width="280" height="280">
            <circle class="gauge-ring" id="space-ring" cx="140" cy="140" r="90"></circle>
            <circle class="gauge-ring" id="light-ring" cx="140" cy="140" r="80"></circle>
        </svg>
    </div>
    <div id="status-panel">
        <div id="sqi-val">00.0</div>
        <div id="guide-msg">ALIGN TO ZENITH</div>
        <div id="sub-guide">デバイスを天頂（真上）に向けて静止してください</div>
    </div>
    <div id="sync-progress-container">
        <div id="sync-progress-bar"></div>
    </div>
</div>

<script>
// --- GLOBAL ---
let CURRENT_MODE = 'NORMAL', isLocked = false;
let spaceBuffer = [], lightHistory = [], starHistory = [], lockCount = 0;
const BUFFER_SIZE = 15, LOCK_REQUIRED = 25;

// ★追加：月補正（簡易）
let moonPenaltyValue = 0;

window.ASTN_DATA = { sqm:0, stars:0, pollution:0, bortle:0, nelm:0, variance:0, confidence:0, score:0, azimuth:0, pitch:0, roll:0, state:"BOOT", timestamp:0 };

// --- MATRIX ---
const Matrix = {
    canvas: document.getElementById('matrix-canvas'), ctx: null, lines: [],
    logicCodes: [
        "SQM = 22.0 - 2.5 * log10(avgL * 1450 + 0.008)",
        "K = P / (P + R); x = x + K * (m - x)",
        "Lum = 0.2126*R + 0.7152*G + 0.0722*B",
        "Persistent_Stars = starHistory.every(frame => frame.includes(idx))",
        "NELM = SQM - 8.89",
        "Confidence = 1.0 - (vari*5 + pErr*0.02 + rErr*0.02)",
        "Bortle = max(1, min(9, (22 - sqm) * 2.3 + 1))"
    ],
    init() { this.ctx = this.canvas.getContext('2d'); this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; },
    push(tag, text) {
        const snippet = this.logicCodes[Math.floor(Math.random() * this.logicCodes.length)];
        this.lines.push({ txt: `[${tag}] ${text} >> ${snippet}`, y: this.canvas.height, x: Math.random() * this.canvas.width * 0.4, alpha: 1.0 });
        if(this.lines.length > 25) this.lines.shift();
    },
    render() {
        this.ctx.clearRect(0,0,this.canvas.width,this.canvas.height);
        this.ctx.font = '8px "Share Tech Mono"';
        this.ctx.fillStyle = CURRENT_MODE==='NIGHT' ? '#f00' : '#0ff';
        this.lines.forEach(l => { 
            l.y -= 2; l.alpha -= 0.008; 
            this.ctx.globalAlpha = Math.max(0, l.alpha);
            this.ctx.fillText(l.txt, l.x, l.y); 
        });
        requestAnimationFrame(() => this.render());
    }
};

const kalman = { pitch:{x:0,P:1,Q:0.005,R:0.1}, roll:{x:0,P:1,Q:0.005,R:0.1}};
function kalmanUpdate(s,m){s.P+=s.Q;const K=s.P/(s.P+s.R);s.x+=K*(m-s.x);s.P*=(1-K);return s.x;}

const Core = {
    SAMPLE_W:64, SAMPLE_H:48,
    toLinear(v){ v/=255; return (v<=0.04045)?v/12.92:Math.pow((v+0.055)/1.055,2.4); },
    detectStarsPersistent(lums){
        let stars=[]; for(let i=0;i<lums.length;i++) if(lums[i]>0.02) stars.push(i);
        starHistory.push(stars); if(starHistory.length<3) return 0;
        let persistent=0; stars.forEach(idx=>{ if(starHistory.every(frame=>frame.includes(idx))) persistent++; });
        if(starHistory.length>5) starHistory.shift(); return persistent;
    },
    analyze(video, canvas){
        if(video.readyState<2) return null;
        const ctx=canvas.getContext('2d');
        canvas.width=this.SAMPLE_W; canvas.height=this.SAMPLE_H;
        ctx.drawImage(video,0,0,this.SAMPLE_W,this.SAMPLE_H);
        const data=ctx.getImageData(0,0,this.SAMPLE_W,this.SAMPLE_H).data;
        let lums=[], rT=0, gT=0, bT=0;
        for(let i=0;i<data.length;i+=4){
            const r=this.toLinear(data[i]), g=this.toLinear(data[i+1]), b=this.toLinear(data[i+2]);
            const lum=0.2126*r+0.7152*g+0.0722*b;
            lums.push(lum); rT+=r; gT+=g; bT+=b;
        }
        const avgL=lums.reduce((a,b)=>a+b,0)/lums.length;

        // ★月補正適用
        const sqm=22.0-2.5*Math.log10(avgL*1450+0.008) - moonPenaltyValue;

        return {sqm, stars:this.detectStarsPersistent(lums), pollution:(rT-bT)/(rT+gT+bT+0.0001)};
    }
};

async function startSequence(mode){
    CURRENT_MODE=mode;
    if(mode==='NIGHT') document.body.classList.add('night-mode');
    document.getElementById('boot-screen').style.opacity='0';
    setTimeout(()=> { 
        document.getElementById('boot-screen').style.display='none'; 
        document.getElementById('hud-overlay').style.display='block'; 
    }, 1000);

    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
    document.getElementById("lumi-video").srcObject=stream;
    Matrix.init(); Matrix.render();

    window.addEventListener('deviceorientation',(e)=>{
        if(isLocked) return;
        const p=kalmanUpdate(kalman.pitch,e.beta);
        const r=kalmanUpdate(kalman.roll,e.gamma);
        let az=(e.alpha+(window.screen.orientation?.angle||0)+360)%360;
        spaceBuffer.push({p,r,az});
        if(spaceBuffer.length>BUFFER_SIZE) spaceBuffer.shift();
    });
    requestAnimationFrame(loop);
}

function loop(){
    const res=Core.analyze(document.getElementById("lumi-video"), document.getElementById("lumi-canvas"));
    if(res && spaceBuffer.length>0){
        const last=spaceBuffer[spaceBuffer.length-1];
        lightHistory.push(res.sqm); if(lightHistory.length>BUFFER_SIZE) lightHistory.shift();
        const avgSQM=lightHistory.reduce((a,b)=>a+b,0)/lightHistory.length;
        const vari=lightHistory.reduce((a,b)=>a+Math.pow(b-avgSQM,2),0)/lightHistory.length;

        const pErr=Math.abs(90-last.p);
        const rErr=Math.abs(last.r);

        // ★confidence
        let confidence = 1.0 - (vari * 5 + pErr * 0.02 + rErr * 0.02);
        confidence = Math.max(0, Math.min(1, confidence));

        // ★観測スコア
        let score = avgSQM * confidence * (1 - res.pollution);

        document.getElementById('sqi-val').innerText=avgSQM.toFixed(1);

        if(pErr>5){
            document.getElementById('guide-msg').innerText="POINT TO ZENITH";
            document.getElementById('sub-guide').innerText="【方位校正】デバイスを天頂に向けてください";
        } else if(vari>0.08){
            document.getElementById('guide-msg').innerText="STABILIZING...";
            document.getElementById('sub-guide').innerText="【輝度解析中】動かさないでください";
        } else {
            document.getElementById('guide-msg').innerText="SYNCING...";
            document.getElementById('sub-guide').innerText="【同期中】そのままキープ";
        }

        if(pErr<1.5 && rErr<1.5 && vari<0.08){
            lockCount++;
            Matrix.push("CALIB", `SYNC ${(lockCount/LOCK_REQUIRED*100).toFixed(0)}%`);
        } else {
            lockCount=Math.max(0, lockCount-0.5);
        }

        document.getElementById('sync-progress-bar').style.width=(lockCount/LOCK_REQUIRED*100)+"%";
        document.getElementById('space-ring').style.strokeDashoffset = 565 * (pErr / 20);
        document.getElementById('light-ring').style.strokeDashoffset = 500 * (vari * 10);

        // ★ASTN_DATA 完全版
        window.ASTN_DATA = {
            sqm:avgSQM,
            stars:res.stars,
            pollution:res.pollution,
            bortle: Math.max(1, Math.min(9, (22 - avgSQM) * 2.3 + 1)),
            nelm: avgSQM - 8.89,
            variance: vari,
            confidence: confidence,
            score: score,
            azimuth:last.az,
            pitch:last.p,
            roll:last.r,
            state: isLocked ? "OBSERVATION" : "CALIBRATION",
            timestamp:Date.now()
        };

        if(lockCount>=LOCK_REQUIRED && !isLocked){
            isLocked=true;
            document.getElementById('guide-msg').innerText="ZENITH LOCKED";
            document.getElementById('sub-guide').innerText="観測OS起動";
            if(navigator.vibrate) navigator.vibrate([100,50,100]);
        }

        if(isLocked){
            document.getElementById('guide-msg').innerText="OBSERVATION READY";
        }
    }
    requestAnimationFrame(loop);
}
</script>
</body>
</html>
