<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS v23 - ULTIMATE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <style>
        :root { --c:#0ff; --g:#0f8; --a:#fc0; --bg:#000; }
        body { margin:0; overflow:hidden; background:#000; color:var(--c); font-family: "Hiragino Sans", "Meiryo", monospace; touch-action:none; }
        
        #ar-canvas { position:fixed; inset:0; z-index:10; }
        #vfx-layer { position:fixed; inset:0; z-index:25; pointer-events:none; background: repeating-linear-gradient(0deg, rgba(0,255,255,0.03) 0px, transparent 1px, transparent 3px); }

        /* 演算マトリクス・レイヤー（背面で流れる数値） */
        #calc-matrix {
            position: fixed; inset: 0; z-index: 15;
            font-size: 10px; color: rgba(0, 255, 128, 0.15);
            pointer-events: none; overflow: hidden;
            line-height: 1.2; white-space: nowrap; font-family: monospace;
            padding: 10px;
        }
        .matrix-line { animation: slideUp 1.5s linear forwards; opacity: 0.8; }
        @keyframes slideUp { from { transform: translateY(100vh); } to { transform: translateY(-10vh); } }

        /* 起動オーバーレイ */
        #boot-overlay { 
            position:fixed; inset:0; z-index:100; 
            background:rgba(0,10,20,0.98); padding:25px; 
            display:flex; flex-direction:column; align-items:center; justify-content:center; 
        }
        #console { width:100%; flex:1; overflow:auto; font-size:11px; margin-bottom:20px; border:1px solid rgba(0,255,255,0.2); padding:12px; background:rgba(0,0,0,0.5); }
        .log { margin-bottom:4px; border-left: 2px solid var(--c); padding-left: 8px; }
        .log.ok { color:var(--g); border-left-color:var(--g); }

        #start-btn { 
            width:90%; padding:20px; background:rgba(0,255,128,0.1); border:2px solid var(--g); 
            color:var(--g); font-size:18px; font-weight:bold; cursor:pointer; letter-spacing:4px;
        }

        /* 強化型HUD */
        #calib-hud { 
            position:fixed; inset:0; z-index:50; display:none; 
            flex-direction:column; align-items:center; justify-content:center; 
            pointer-events:none; transition: opacity 0.5s;
        }

        .reticle-container { position:relative; width:220px; height:220px; margin-bottom:30px; }
        .zenith-reticle { 
            position:absolute; inset:0; border:1px dashed rgba(0,255,255,0.2); border-radius:50%; 
            transition: all 0.3s ease;
        }
        .zenith-reticle.active { 
            border:2px solid var(--g); transform:scale(1.1); 
            box-shadow: 0 0 40px rgba(0,255,128,0.4);
        }

        #guide-dot {
            position:absolute; width:16px; height:16px; background:var(--a); border-radius:50%;
            left:50%; top:50%; margin:-8px 0 0 -8px;
            transition: transform 0.1s linear, background-color 0.3s;
            box-shadow: 0 0 15px var(--a);
        }

        #status-display { text-align:center; min-height:90px; }
        #main-msg { font-size:26px; color:var(--a); font-weight:bold; margin-bottom:8px; text-shadow:0 0 10px rgba(255,204,0,0.5); }
        #sub-msg { font-size:13px; color:var(--c); opacity:0.8; letter-spacing:1px; }
        
        .progress-box { width:260px; height:3px; background:rgba(0,255,255,0.1); margin-top:25px; border:1px solid rgba(0,255,255,0.2); }
        #bar { height:100%; background:var(--g); width:0%; transition: width 0.1s; box-shadow:0 0 10px var(--g); }
    </style>
</head>
<body>

<canvas id="ar-canvas"></canvas>
<div id="vfx-layer"></div>
<div id="calc-matrix"></div>

<div id="boot-overlay">
    <div style="font-size:22px; letter-spacing:10px; margin-bottom:20px; font-weight:bold; color:var(--c);">NEXUS v23</div>
    <div id="console"></div>
    <button id="start-btn">システム初期化</button>
</div>

<div id="calib-hud">
    <div class="reticle-container">
        <div id="reticle" class="zenith-reticle"></div>
        <div id="guide-dot"></div>
    </div>
    <div id="status-display">
        <div id="main-msg">天頂待機中</div>
        <div id="sub-msg">デバイスを真上の空へ向けてください</div>
    </div>
    <div class="progress-box"><div id="bar"></div></div>
</div>

<script>
let scene, camera, renderer, stars, zenithOK = false, isCalibrating = false;
let hasVibrated = false;
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);

function log(t, c="") {
    const d = document.createElement("div");
    d.className = "log " + c; d.textContent = ">> " + t;
    const con = document.getElementById("console");
    con.appendChild(d); con.scrollTop = con.scrollHeight;
}

// --- 電子音生成 (SFチックな高音) ---
function playLockSound() {
    try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1760, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    } catch (e) {}
}

// --- AR環境初期化 ---
function initAR() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({canvas:document.getElementById('ar-canvas'), alpha:true, antialias:true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    const geo = new THREE.BufferGeometry();
    const pos = [];
    for(let i=0; i<3000; i++) pos.push((Math.random()-0.5)*200, (Math.random()-0.5)*200, (Math.random()-0.5)*200);
    geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
    stars = new THREE.Points(geo, new THREE.PointsMaterial({color:0xffffff, size:0.25, opacity:0, transparent:true}));
    scene.add(stars);
    camera.position.z = 0.1;
    (function animate(){ requestAnimationFrame(animate); renderer.render(scene, camera); })();
}

// --- センサー & カメラ起動 ---
document.getElementById('start-btn').addEventListener('click', async () => {
    log("ハードウェア・アクセス開始...");
    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        try {
            const res = await DeviceOrientationEvent.requestPermission();
            if (res === 'granted') window.addEventListener("deviceorientation", onOrientation, true);
        } catch (e) { log("センサー拒否", "warn"); }
    } else {
        window.addEventListener("deviceorientation", onOrientation, true);
    }

    try {
        const stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: "environment"}});
        log("光学デバイス：オンライン", "ok");
        startCalibrationSequence(stream);
    } catch (e) { log("カメラエラー: " + e.message, "warn"); }
});

// --- 姿勢制御 & 演出 ---
function onOrientation(e) {
    if(e.alpha === null) return;
    camera.rotation.set(THREE.MathUtils.degToRad(e.beta), THREE.MathUtils.degToRad(e.alpha), THREE.MathUtils.degToRad(-e.gamma), 'YXZ');

    const dot = document.getElementById("guide-dot");
    const bErr = e.beta + 90, gErr = e.gamma;
    const totalError = Math.sqrt(bErr*bErr + gErr*gErr);
    
    // ドット縮小演出
    const dotScale = Math.max(0.5, Math.min(1.5, 0.5 + (totalError / 60)));
    dot.style.transform = `translate(${Math.max(-90, Math.min(90, gErr))}px, ${Math.max(-90, Math.min(90, bErr))}px) scale(${dotScale})`;

    // 天頂判定 (甘めの前後30度)
    zenithOK = (Math.abs(bErr) < 30 && Math.abs(gErr) < 30);

    const ret = document.getElementById("reticle"), mainMsg = document.getElementById("main-msg"), subMsg = document.getElementById("sub-msg");

    if(!isCalibrating) {
        if(zenithOK) {
            if (!hasVibrated) {
                playLockSound();
                if (!isIOS && navigator.vibrate) navigator.vibrate(60);
                hasVibrated = true;
            }
            ret.classList.add("active");
            dot.style.background = "var(--g)";
            mainMsg.textContent = "照準固定"; mainMsg.style.color = "var(--g)";
            subMsg.textContent = "解析シーケンスを開始します...";
        } else {
            hasVibrated = false;
            ret.classList.remove("active");
            dot.style.background = "var(--a)";
            mainMsg.textContent = "天頂捕捉中"; mainMsg.style.color = "var(--a)";
            subMsg.textContent = "デバイスを空の方向へ傾けてください";
        }
    }
}

// --- 解析 & 演算マトリクス演出 ---
function startCalibrationSequence(stream) {
    document.getElementById("boot-overlay").style.display = "none";
    document.getElementById("calib-hud").style.display = "flex";

    const v = document.createElement("video");
    v.srcObject = stream; v.play();
    const c = document.createElement("canvas");
    const ctx = c.getContext("2d");
    const matrix = document.getElementById("calc-matrix");
    let samples = [];

    const loop = setInterval(() => {
        if(!zenithOK || (isCalibrating && samples.length >= 100)) return;

        if(!isCalibrating) {
            isCalibrating = true;
            document.getElementById("main-msg").textContent = "解析中...";
            document.getElementById("sub-msg").textContent = "環境光データを抽出しています";
        }

        c.width = 40; c.height = 40;
        ctx.drawImage(v, 0, 0, 40, 40);
        const img = ctx.getImageData(0,0,40,40).data;
        let brightnessSet = [], debugLine = "";

        for(let i=0; i<img.length; i+=4) {
            let b = (img[i] + img[i+1] + img[i+2]) / 3;
            if(b < 252) {
                brightnessSet.push(b);
                if(i % 60 === 0) debugLine += b.toFixed(0).padStart(3, '0') + " ";
            }
        }

        // 演算マトリクス表示
        const lineEl = document.createElement("div");
        lineEl.className = "matrix-line"; lineEl.textContent = debugLine;
        matrix.appendChild(lineEl);
        if(matrix.childNodes.length > 40) matrix.removeChild(matrix.firstChild);

        if(brightnessSet.length === 0) return;
        brightnessSet.sort((a,b)=>a-b);
        samples.push(brightnessSet[Math.floor(brightnessSet.length/2)]);
        document.getElementById("bar").style.width = samples.length + "%";
        
        if(samples.length >= 100) {
            clearInterval(loop);
            matrix.style.opacity = "0";
            finalize(samples.reduce((a,b)=>a+b)/samples.length);
        }
    }, 45);
}

function finalize(lumi) {
    document.getElementById("main-msg").textContent = "同期完了";
    document.getElementById("sub-msg").textContent = "AR空間を最適化しました";
    let op = 0;
    const targetAlpha = Math.max(0.3, 1 - (lumi/180));
    const reveal = setInterval(() => {
        op += 0.05; stars.material.opacity = op * targetAlpha;
        if(op >= 1) {
            clearInterval(reveal);
            document.getElementById("calib-hud").style.opacity = "0";
            setTimeout(() => {
                alert(`NEXUS SYNC SUCCESS\n輝度確定値: ${lumi.toFixed(1)}\n星空出力レベル: ${Math.round(targetAlpha*100)}%`);
            }, 500);
        }
    }, 50);
}

window.onload = () => { initAR(); log("NEXUS v23 待機中..."); };
</script>
</body>
</html>
