<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASTRONEX / SHIZUKU FINAL</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    background:#000;
    color:#00ffcc;
    font-family:"JetBrains Mono", monospace;
    overflow:hidden;
}

/* ===== 起動前 ===== */
#bootScreen{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
}

@keyframes pulse{
    0%{box-shadow:0 0 10px rgba(0,255,200,0.2);}
    50%{box-shadow:0 0 40px rgba(0,255,200,0.7);}
    100%{box-shadow:0 0 10px rgba(0,255,200,0.2);}
}

#triggerBtn{
    width:200px;
    height:200px;
    border-radius:50%;
    border:1px solid #00ffcc;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    animation:pulse 2.2s infinite;
}

#triggerBtn:active{
    transform:scale(0.92);
    filter:brightness(2);
}

/* ===== ログ ===== */
#bootLog{
    display:none;
    position:absolute;
    width:100%;
    height:100%;
    padding:10px;
    font-size:12px;
    overflow:hidden;
}

.line{
    opacity:0;
    animation:fadeIn 0.6s forwards;
}

@keyframes fadeIn{
    from{opacity:0;transform:translateY(5px);}
    to{opacity:1;transform:translateY(0);}
}

/* ===== スキャンライン ===== */
.scanline{
    pointer-events:none;
    position:absolute;
    width:100%;
    height:100%;
    background:repeating-linear-gradient(
        transparent,
        transparent 2px,
        rgba(0,255,200,0.05) 3px
    );
    animation:scanMove 6s linear infinite;
}

@keyframes scanMove{
    0%{background-position:0 0;}
    100%{background-position:0 100%;}
}

/* ===== フラッシュ ===== */
.flash{
    position:absolute;
    width:100%;
    height:100%;
    background:radial-gradient(circle, rgba(0,255,200,0.7), transparent);
    opacity:0;
    animation:flash 0.6s ease;
}

@keyframes flash{
    0%{opacity:0;}
    40%{opacity:1;}
    100%{opacity:0;}
}

/* ===== フェード ===== */
.fadeOut{
    opacity:0;
    transition:opacity 1.5s ease;
}

/* ===== READY ===== */
#ready{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    opacity:0;
    transition:opacity 1.2s ease;
    font-size:18px;
    letter-spacing:2px;
}
</style>
</head>

<body>

<div id="bootScreen">
    <div id="triggerBtn">INIT</div>
</div>

<div id="bootLog"></div>
<div class="scanline"></div>
<div id="ready">READY</div>

<script>

/* =========================
   LOG
========================= */
const logEl=document.getElementById("bootLog");

function log(msg){
    const d=document.createElement("div");
    d.className="line";
    d.textContent=msg;
    logEl.appendChild(d);
    logEl.scrollTop=logEl.scrollHeight;
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

/* =========================
   SENSOR
========================= */
let imu={ax:0,ay:0,az:0,gx:0,gy:0,gz:0};

function initSensors(){
    window.addEventListener("devicemotion",e=>{
        imu.ax=e.accelerationIncludingGravity?.x||0;
        imu.ay=e.accelerationIncludingGravity?.y||0;
        imu.az=e.accelerationIncludingGravity?.z||0;
    });
    window.addEventListener("deviceorientation",e=>{
        imu.gx=e.alpha||0;
        imu.gy=e.beta||0;
        imu.gz=e.gamma||0;
    });
}

function norm(x,y,z){
    return Math.sqrt(x*x+y*y+z*z);
}

/* =========================
   GPU ベンチ（2回平均）
========================= */
async function runBenchmark(){

    if(!navigator.gpu){
        return {cls:"LOW", gflops:0};
    }

    const adapter=await navigator.gpu.requestAdapter();
    const device=await adapter.requestDevice();

    const LOOP=500;
    const THREADS=512;
    const FLOP_PER_LOOP=60;

    const shader=`
@compute @workgroup_size(64)
fn main(@builtin(global_invocation_id) id: vec3<u32>) {
    var x: f32 = f32(id.x);
    for (var i: u32 = 0u; i < ${LOOP}u; i = i + 1u) {
        x = sin(x) * cos(x);
    }
}
`;

    const module=device.createShaderModule({code:shader});
    const pipeline=device.createComputePipeline({
        layout:"auto",
        compute:{module,entryPoint:"main"}
    });

    async function run(){
        const t0=performance.now();
        const enc=device.createCommandEncoder();
        const pass=enc.beginComputePass();
        pass.setPipeline(pipeline);
        pass.dispatchWorkgroups(THREADS);
        pass.end();
        device.queue.submit([enc.finish()]);
        await device.queue.onSubmittedWorkDone();
        const t1=performance.now();
        const time=(t1-t0)/1000;
        const total=THREADS*LOOP*FLOP_PER_LOOP;
        return total/time/1e9;
    }

    await run();
    const g1=await run();
    const g2=await run();

    const avg=(g1+g2)/2;

    let cls="LOW";
    if(avg>5) cls="MID";
    if(avg>20) cls="HIGH";

    return {cls,gflops:avg};
}

/* =========================
   MODEL SELECT（年代付き）
========================= */
function selectModel(cls){

    if(cls==="HIGH"){
        return {
            refraction:"NUMERICAL (FULL SOLVER)",
            stack:"SUBPIXEL_WEIGHTED",
            sqm:"FULL_CORRECTION",
            fidelity:1.0
        };
    }

    if(cls==="MID"){
        return {
            refraction:"BENNETT (1979)",
            stack:"WEIGHTED",
            sqm:"PARTIAL",
            fidelity:0.92
        };
    }

    return {
        refraction:"STANDARD ATMOSPHERE (ISA 1976)",
        stack:"AVERAGE",
        sqm:"LOG_ONLY",
        fidelity:0.80
    };
}

/* =========================
   RELIABILITY
========================= */
function calcReliability(fidelity){
    const sensor=0.95+Math.random()*0.03;
    const data=0.90+Math.random()*0.05;
    return sensor*data*fidelity;
}

/* =========================
   可変速度
========================= */
function delayCurve(p){
    return 20 + p*120;
}

/* =========================
   BOOT
========================= */
async function boot(){

    document.getElementById("bootScreen").style.display="none";
    logEl.style.display="block";

    /* 点火 */
    document.body.style.background="#00ffcc";
    await sleep(80);
    document.body.style.background="#000";

    initSensors();

    let steps=[];

    steps.push(()=>`[ SEEK ] GYRO .... LOCKED | ω=${norm(imu.gx,imu.gy,imu.gz).toFixed(5)} rad/s`);
    steps.push(()=>`[ SEEK ] ACC ..... LOCKED | g=${norm(imu.ax,imu.ay,imu.az).toFixed(3)} m/s²`);

    steps.push(()=>`[ SEEK ] MAGNET ... ERROR`);
    steps.push(()=>`RETRYING...`);
    steps.push(()=>`[ SEEK ] MAGNET ... LOCKED`);

    steps.push(()=>`[ ANALYSIS ] SENSOR VARIANCE COMPUTING...`);
    steps.push(()=>`[ GPU ] COMPUTE TEST RUNNING...`);

    for(let i=0;i<steps.length;i++){
        log(steps[i]());
        await sleep(delayCurve(i/steps.length));
    }

    const gpu=await runBenchmark();

    log(`[ GPU ] PERFORMANCE CLASS: ${gpu.cls}`);
    log(`[ GPU ] EST. THROUGHPUT: ${gpu.gflops.toFixed(2)} GFLOPS (UNCALIBRATED)`);

    const model=selectModel(gpu.cls);

    log(`[ MODEL ] REFRACTION: ${model.refraction}`);
    log(`[ MODEL ] STACK: ${model.stack}`);
    log(`[ MODEL ] SQM: ${model.sqm}`);

    const reliability=calcReliability(model.fidelity);

    log(`[ RELIABILITY ] ${reliability.toFixed(3)} (${gpu.cls}-LIMITED)`);

    await sleep(400);

    log(`ATTITUDE SOLVER: EKF (Q=1e-5, R=3e-3)`);

    await sleep(400);

    log(`SYNCHRONIZING...`);
    await sleep(300);
    log(`STABILIZING SOLUTION...`);
    await sleep(400);

    log(`ERROR CONVERGENCE: ${(Math.random()*0.0001).toFixed(6)}`);

    await sleep(300);

    log(`INERTIAL FRAME: LOCKED`);
    log(`CELESTIAL FRAME: SOLVED`);

    await sleep(800);

    log(`>>> ENTER OBSERVATION MODE`);

    const f=document.createElement("div");
    f.className="flash";
    document.body.appendChild(f);

    await sleep(500);

    logEl.classList.add("fadeOut");

    await sleep(1500);

    logEl.style.display="none";

    const ready=document.getElementById("ready");
    await sleep(300);
    ready.style.opacity=1;
}

/* =========================
   TRIGGER
========================= */
document.getElementById("triggerBtn").onclick=boot;

</script>
</body>
</html>
