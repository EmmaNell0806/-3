<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS - CALIBRATION CORE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <style>
        :root { --c:#0ff; --g:#0f8; --a:#fc0; --r:#f33; }
        body { margin:0; overflow:hidden; background:#000; color:var(--c); font-family: "Share Tech Mono", monospace; touch-action:none; }
        
        /* 背面：AR空間（最初は隠れている） */
        #ar-canvas { position:fixed; inset:0; z-index:5; opacity:0; }
        
        /* 前面：演算マトリクスレイヤー */
        #data-matrix {
            position: fixed; inset: 0; z-index: 20;
            font-size: 10px; color: var(--g); pointer-events: none;
            overflow: hidden; padding: 20px; line-height: 1.2; opacity: 0.6;
        }
        .matrix-line { margin-bottom: 2px; white-space: nowrap; animation: scanline 0.5s linear; }
        @keyframes scanline { from { opacity:0; transform:translateX(-10px); } to { opacity:1; transform:translateX(0); } }

        /* メインHUD */
        #hud-overlay {
            position: fixed; inset: 0; z-index: 50;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle, transparent 20%, rgba(0,10,20,0.8) 100%);
        }
        
        /* ターゲットレティクル */
        .target-box {
            position: relative; width: 280px; height: 280px;
            border: 1px solid rgba(0, 255, 255, 0.2); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        #aim-dot {
            position: absolute; width: 30px; height: 30px;
            border: 2px solid var(--a); border-radius: 50%;
            box-shadow: 0 0 15px var(--a); transition: transform 0.1s linear;
        }

        /* 演算パネル（解析中に表示） */
        #calc-panel {
            position: absolute; top: 10%; width: 90%; 
            background: rgba(0, 20, 30, 0.7); border: 1px solid var(--c);
            padding: 15px; display: none; font-size: 11px;
        }
        .math-row { color: var(--c); margin-bottom: 5px; border-bottom: 1px solid rgba(0,255,255,0.1); }

        /* 操作パネル */
        #control-panel {
            position: absolute; bottom: 10%; width: 100%;
            display: flex; flex-direction: column; align-items: center;
        }
        #calib-btn {
            width: 85%; padding: 25px; background: rgba(0, 255, 128, 0.1);
            border: 2px solid var(--g); color: var(--g);
            font-size: 22px; font-weight: bold; letter-spacing: 5px;
            cursor: pointer; pointer-events: auto;
        }
        #calib-btn:active { background: var(--g); color: #000; }
        #calib-btn:disabled { border-color: #444; color: #444; background: none; }

        .progress-container { width: 85%; height: 4px; background: #111; margin-top: 20px; position: relative; }
        #progress-bar { width: 0%; height: 100%; background: var(--g); box-shadow: 0 0 10px var(--g); }
    </style>
</head>
<body>

<canvas id="ar-canvas"></canvas>
<div id="data-matrix"></div>

<div id="hud-overlay">
    <div id="calc-panel">
        <div class="math-row" id="math-1">Σ Lumi_i / N = E[L]</div>
        <div class="math-row" id="math-2">Δθ = arctan(√(Ax²+Ay²)/Az)</div>
        <div class="math-row" id="math-3">Q_adj = [cos(φ/2), n*sin(φ/2)]</div>
        <div id="live-data" style="color:var(--g); font-family:monospace;"></div>
    </div>

    <div class="target-box">
        <div id="aim-dot"></div>
        <div style="color:rgba(0,255,255,0.3); font-size:10px;">ZENITH_ALIGNMENT</div>
    </div>

    <div id="control-panel">
        <div id="status-text" style="margin-bottom:10px; font-weight:bold;">天頂に固定してボタンを押してください</div>
        <button id="calib-btn">校正開始 (CALIBRATE)</button>
        <div class="progress-container"><div id="progress-bar"></div></div>
    </div>
</div>

<script>
/**
 * --- NEXUS CALIBRATION CORE ---
 */
const Core = {
    bias: {x:0, y:0}, last: {b:0, g:0}, head: 0,
    smooth: (c, t, f=0.35) => c + (t-c)*f,
    // 物理演算シミュレーション用
    getMathStr: (val) => {
        const formulas = [
            `f(x) = ∫ e^(-t²) dt ≈ ${val.toFixed(4)}`,
            `L_ratio = (max - min) / avg = ${(Math.random()*val).toFixed(2)}`,
            `Vector_F = [${(Math.random()-0.5).toFixed(3)}, ${(Math.random()-0.5).toFixed(3)}, ${(Math.random()-0.5).toFixed(3)}]`,
            `P_error = Erf(Δz / √2σ) = ${Math.random().toFixed(5)}`
        ];
        return formulas[Math.floor(Math.random()*formulas.length)];
    }
};

let scene, camera, renderer, stars, isCalibrating = false, videoStream, currentOrient = {b:0, g:0};

function init() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({canvas:document.getElementById('ar-canvas'), alpha:true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    
    const geo = new THREE.BufferGeometry(); const pos = [];
    for(let i=0; i<3000; i++) pos.push((Math.random()-0.5)*250, (Math.random()-0.5)*250, (Math.random()-0.5)*250);
    geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
    stars = new THREE.Points(geo, new THREE.PointsMaterial({color:0xffffff, size:0.3, transparent:true, opacity:0}));
    scene.add(stars);
    render();
}

function render() {
    requestAnimationFrame(render);
    const dot = document.getElementById('aim-dot');
    const tx = Math.max(-130, Math.min(130, currentOrient.g * 2.5));
    const ty = Math.max(-130, Math.min(130, (currentOrient.b + 90) * 2.5));
    dot.style.transform = `translate(${tx}px, ${ty}px)`;
    
    if(isCalibrating) {
        camera.rotation.set(THREE.MathUtils.degToRad(currentOrient.b), 0, THREE.MathUtils.degToRad(-currentOrient.g));
    }
    renderer.render(scene, camera);
}

// センサー取得
window.addEventListener('deviceorientation', (e) => {
    currentOrient.b = e.beta; currentOrient.g = e.gamma;
}, true);

// ボタンアクション
document.getElementById('calib-btn').addEventListener('click', async () => {
    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        await DeviceOrientationEvent.requestPermission();
    }
    
    try {
        videoStream = await navigator.mediaDevices.getUserMedia({video: {facingMode: "environment"}});
        startCalibrationSequence();
    } catch (e) { alert("カメラ許可が必要です"); }
});

function startCalibrationSequence() {
    isCalibrating = true;
    const btn = document.getElementById('calib-btn');
    const panel = document.getElementById('calc-panel');
    const matrix = document.getElementById('data-matrix');
    const live = document.getElementById('live-data');
    
    btn.disabled = true;
    btn.textContent = "CALIBRATING...";
    panel.style.display = "block";
    
    let count = 0;
    const maxSamples = 100;
    
    const calibLoop = setInterval(() => {
        count++;
        const progress = (count / maxSamples) * 100;
        document.getElementById('progress-bar').style.width = progress + "%";
        
        // --- 演算表示演出 ---
        // 1. マトリクスログ（生データ流し）
        const line = document.createElement('div');
        line.className = 'matrix-line';
        line.textContent = `RAW_DATA_STREAM [B:${currentOrient.b.toFixed(2)} G:${currentOrient.g.toFixed(2)}] >> CALC_REF: ${Math.random().toString(16).slice(2,10)}`;
        matrix.appendChild(line);
        if(matrix.childNodes.length > 30) matrix.removeChild(matrix.firstChild);

        // 2. パネル内数式更新
        if(count % 5 === 0) {
            document.getElementById('math-1').textContent = `∫ Lumi_dt = ${Core.getMathStr(Math.random()*255)}`;
            document.getElementById('math-2').textContent = `Δ_Bias_Correction = [${(Math.random()*0.1).toFixed(4)}, ${(Math.random()*0.1).toFixed(4)}]`;
            document.getElementById('math-3').textContent = `Quaternion_Sync: ${Math.sin(count).toFixed(5)} + ${Math.cos(count).toFixed(5)}i`;
        }
        
        live.innerHTML = `
            ACCEL_X: ${(Math.random()*9.8).toFixed(4)} m/s²<br>
            GYRO_Z: ${(Math.random()*0.5).toFixed(4)} rad/s<br>
            S_NOISE: ${(-60 - Math.random()*20).toFixed(1)} dBm
        `;

        if(count >= maxSamples) {
            clearInterval(calibLoop);
            finishCalibration();
        }
    }, 40);
}

function finishCalibration() {
    document.getElementById('status-text').textContent = "校正完了：AR空間接続成功";
    document.getElementById('status-text').style.color = "var(--g)";
    document.getElementById('calib-btn').style.display = "none";
    
    // 演出：HUDを消してARを表示
    setTimeout(() => {
        document.getElementById('hud-overlay').style.transition = "opacity 1s";
        document.getElementById('hud-overlay').style.opacity = "0";
        document.getElementById('data-matrix').style.opacity = "0.1";
        
        document.getElementById('ar-canvas').style.opacity = "1";
        let op = 0;
        const reveal = setInterval(() => {
            op += 0.05;
            stars.material.opacity = op;
            if(op >= 1) clearInterval(reveal);
        }, 50);
    }, 800);
}

window.onload = init;
</script>
</body>
</html>
