<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASTRONEX V1.8.6-REV4 : FULL_CALIBRATION</title>
    <style>
        :root { --main-red: #ff0000; --target: #00ffff; --harvest: #00ff00; --hud-bg: rgba(0,0,0,0.95); --log-blue: #00aaff; }
        body, html { margin:0; padding:0; width:100%; height:100%; background:#000; color:var(--main-red); font-family:'Courier New', monospace; overflow:hidden; }
        canvas, video { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
        #webcam { z-index:0; opacity:0.35; display:none; }
        #boot-screen { position:absolute; inset:0; background:#000; z-index:1000; display:flex; flex-direction:column; padding:20px; box-sizing:border-box; }
        #kernel-log { flex:1; color:var(--log-blue); font-size:9px; overflow:hidden; line-height:1.2; border-left:1px solid var(--log-blue); padding-left:10px; }
        #raw-stream { position:absolute; right:20px; top:20px; width:220px; color:var(--harvest); font-size:8px; text-align:right; border-right:1px solid var(--harvest); padding-right:10px; line-height:1.4; white-space:pre-wrap; }
        #boot-ctrl { position:absolute; bottom:40px; left:0; width:100%; text-align:center; display:none; }
        .boot-btn { border:1px solid var(--main-red); background:rgba(26,0,0,0.8); color:var(--main-red); padding:15px 30px; cursor:pointer; font-family:inherit; font-weight:bold; margin:0 10px; transition:0.3s; }
        #ar-hud { position:absolute; top:10px; left:10px; right:10px; display:none; z-index:10; pointer-events:none; }
        .hud-item { background:var(--hud-bg); border:1px solid var(--main-red); padding:5px 8px; font-size:9px; margin-bottom:5px; display:inline-block; }
        #gate-status { float:right; border-color:var(--harvest); color:var(--harvest); font-weight:bold; }
        #calib-panel { position:absolute; bottom:10px; left:10px; right:10px; z-index:20; display:none; }
        #dark-panel   { position:absolute; bottom:10px; left:10px; right:10px; z-index:20; display:none; }
        #three-panel  { position:absolute; bottom:10px; left:10px; right:10px; z-index:20; display:none; }
        .panel-box { background:rgba(0,0,0,0.92); border:1px solid var(--main-red); padding:10px; font-size:9px; color:var(--harvest); }
        .panel-title { color:var(--target); font-weight:bold; margin-bottom:6px; letter-spacing:2px; }
        .calib-btn { border:1px solid var(--harvest); background:rgba(0,26,0,0.8); color:var(--harvest); padding:8px 16px; cursor:pointer; font-family:inherit; font-size:9px; margin:3px; }
        .star-select { background:#000; color:var(--target); border:1px solid var(--target); font-family:inherit; font-size:9px; padding:4px; width:100%; margin:3px 0; }
        #progress-bar-wrap { width:100%; background:#111; border:1px solid var(--main-red); height:6px; margin-top:4px; }
        #progress-bar { height:6px; background:var(--harvest); width:0%; transition:width 0.1s; }
        #evidence-overlay { position:absolute; inset:0; background:rgba(0,0,0,0.98); z-index:2000; display:none; flex-direction:column; justify-content:center; padding:40px; color:var(--target); }
        .axi-cert { border-left: 2px solid var(--target); padding-left: 25px; font-size: 11px; line-height: 1.4; }
    </style>
</head>
<body>
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="ar-canvas"></canvas>

    <div id="boot-screen">
        <div id="kernel-log"></div>
        <div id="raw-stream"></div>
        <div id="boot-ctrl">
            <button class="boot-btn" onclick="initializeSystem()">[ EXECUTE_INTEGRITY_BOOT ]</button>
        </div>
    </div>

    <div id="ar-hud">
        <div class="hud-item" style="border-color:var(--target);">AQI: <span id="val-axi">--.-</span>%</div>
        <div class="hud-item">SQM: <span id="val-sqm">--.--</span></div>
        <div class="hud-item">W-STACKS: <span id="val-stacks">0.00</span>s</div>
        <div id="gate-status" class="hud-item">GATE_CLOSED</div>
    </div>

    <div id="calib-panel">
        <div class="panel-box">
            <div class="panel-title">[ ZENITH_CALIBRATION ]</div>
            <div id="calib-status">デバイスを天頂（真上）に向けてボタンを押してください</div>
            <button class="calib-btn" onclick="execZenithCalib()">[ SET_ZENITH ]</button>
            <button class="calib-btn" onclick="closePanel('calib-panel')">[ CLOSE ]</button>
        </div>
    </div>

    <div id="dark-panel">
        <div class="panel-box">
            <div class="panel-title">[ DARK_FRAME_ACQUISITION ]</div>
            <div id="dark-status">レンズを完全に遮蔽してからボタンを押してください（30フレーム取得）</div>
            <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
            <button class="calib-btn" onclick="execDarkCapture()">[ CAPTURE_DARK ]</button>
            <button class="calib-btn" onclick="closePanel('dark-panel')">[ CLOSE ]</button>
        </div>
    </div>

    <div id="three-panel">
        <div class="panel-box">
            <div class="panel-title">[ THREE_POINT_CORRECTION ]</div>
            <div id="three-status">星をカメラ中央に入れて星名を選択し [ REGISTER ] を押してください</div>
            <select class="star-select" id="star-select"></select>
            <div id="three-log">登録済み: 0/3</div>
            <button class="calib-btn" onclick="registerStar()">[ REGISTER ]</button>
            <button class="calib-btn" onclick="computeHomography()">[ COMPUTE ]</button>
            <button class="calib-btn" onclick="resetThreePoints()">[ RESET ]</button>
            <button class="calib-btn" onclick="closePanel('three-panel')">[ CLOSE ]</button>
        </div>
    </div>

    <div id="ctrl-btns" style="position:absolute;bottom:10px;right:10px;z-index:20;display:none;">
        <button class="calib-btn" onclick="openPanel('calib-panel')">Z-CAL</button>
        <button class="calib-btn" onclick="openPanel('dark-panel')">DARK</button>
        <button class="calib-btn" onclick="openPanel('three-panel')">3PT</button>
    </div>

    <div id="evidence-overlay">
        <h2 style="color:white; letter-spacing:5px;">ASTRONEX_INTEGRITY</h2>
        <div class="axi-cert" id="final-cert-text"></div>
        <button class="boot-btn" style="margin-top:40px; border-color:var(--harvest);" onclick="location.reload()">[ RE_BOOT ]</button>
    </div>

    <script>
        const PHYS = { target_stacks: 300, sqm_site_est: 21.45, gyro_limit_degs: 0.45 };

        const SITE = {
            lat_deg: 35.6895,
            lng_deg: 139.6917,
            _lat_rad: 35.6895 * Math.PI / 180,
            // [FIX16-07] 磁気偏角（magnetic declination）：東京付近≈7.0°西偏（2024年値）
            // 出典：国土地理院 地磁気計算サービス（https://vldb.gsi.go.jp/sokuchi/geomag/）
            // DeviceOrientationEvent.alphaは磁北基準のため真北補正が必要
            // 西偏のため真北方位角 = 磁北方位角 - mag_decl_rad（値は負）
            // Geolocation取得後に更新することが望ましいが固定値でも誤差7°以内
            _mag_decl_rad: -7.0 * Math.PI / 180
        };

        const FOV_H_RAD = 70.0 * Math.PI / 180.0;
        const FOV_V_RAD = 50.0 * Math.PI / 180.0;

        const _EPS_LOG = 1e-9;
        const _EPS_ZERO = 1e-12;

        function getLocalSiderealTime(){
            const now = new Date();
            const JD   = (now.getTime() / 86400000) + 2440587.5;
            const D    = JD - 2451545.0;
            const Dn   = Math.trunc(D);
            const Df   = D - Dn;
            const T    = D / 36525.0;
            const GMST_int = 280.46061837 + 360.98564736629 * Dn;
            const GMST_frac = 360.98564736629 * Df
                            + 0.000387933 * T * T
                            - T * T * T / 38710000.0;
            const GMST_deg = GMST_int + GMST_frac;
            const LST_deg  = ((GMST_deg + SITE.lng_deg) % 360 + 360) % 360;
            return LST_deg * Math.PI / 180;
        }

        function _clamp(v, min, max){ return (!isFinite(v)||isNaN(v)) ? 0 : Math.min(max, Math.max(min, v)); }

        function equatorialToHorizontalWithLST(ra_h, dec_deg, LST){
            const ra_rad  = ra_h * Math.PI / 12.0;
            const dec_rad = dec_deg * Math.PI / 180.0;
            let HA        = LST - ra_rad;
            HA = HA - 2*Math.PI * Math.round(HA / (2*Math.PI));
            const lat     = SITE._lat_rad;
            const sinAlt  = Math.sin(dec_rad)*Math.sin(lat) + Math.cos(dec_rad)*Math.cos(lat)*Math.cos(HA);
            const alt_rad = Math.asin(_clamp(sinAlt, -1+1e-9, 1-1e-9));
            const cosAz   = (Math.sin(dec_rad) - Math.sin(alt_rad)*Math.sin(lat))
                          / (Math.cos(alt_rad)*Math.cos(lat) + _EPS_ZERO);
            let az_rad    = Math.acos(_clamp(cosAz, -1+1e-9, 1-1e-9));
            if(Math.sin(HA) > 0) az_rad = 2*Math.PI - az_rad;
            return { az_rad, alt_rad };
        }

        function equatorialToHorizontal(ra_h, dec_deg){
            return equatorialToHorizontalWithLST(ra_h, dec_deg, getLocalSiderealTime());
        }

        const STAR_CATALOG = [
            { name:"Polaris",    ra:2.5303,  dec:89.264 }, { name:"Vega",       ra:18.6156, dec:38.784 },
            { name:"Altair",     ra:19.8463, dec:8.868  }, { name:"Deneb",      ra:20.6905, dec:45.280 },
            { name:"Arcturus",   ra:14.2610, dec:19.182 }, { name:"Capella",    ra:5.2781,  dec:45.998 },
            { name:"Rigel",      ra:5.2423,  dec:-8.202 }, { name:"Procyon",    ra:7.6550,  dec:5.225  },
            { name:"Betelgeuse", ra:5.9195,  dec:7.407  }, { name:"Aldebaran",  ra:4.5987,  dec:16.509 },
            { name:"Spica",      ra:13.4199, dec:-11.161}, { name:"Antares",    ra:16.4901, dec:-26.432},
            { name:"Fomalhaut",  ra:22.9608, dec:-29.622}, { name:"Regulus",    ra:10.1395, dec:11.967 },
            { name:"Sirius",     ra:6.7526,  dec:-16.716}, { name:"Canopus",    ra:6.3992,  dec:-52.696}
        ];

        const CONSTELLATION_LINES = [
            ["Betelgeuse","Rigel"],["Betelgeuse","Aldebaran"], ["Vega","Altair"],["Vega","Deneb"],["Altair","Deneb"],
            ["Arcturus","Spica"],["Regulus","Arcturus"]
        ];

        let state = {
            isExposing: false, stacks: 0, gyro_mag_degs: 0, aqi: 0, far: 0.10, gss: 0.05, tcf: 0.05, zenith_err: 0.0,
            orientation: {roll:0, pitch:0}, orientationLPF: {roll:0, pitch:0}, _orientationLPF2: {roll:0, pitch:0},
            _lastRAF: performance.now(), _sensorTimeout: 0, _sensorFail: false,
            _finalized: false, _dtFinal: 0.016,
            _dtHistory: [0.016], _gyroBias: 0, _prevPhiNorm: 0,
            _stableCounter: 0, _quantumLocked: false, _airmassSafe: 1.0,
            _noiseBuf: [], _uiFrame: 0, _sqmDynamic: 21.45,
            _sensorWarmup: 0, _prevSQM: 21.45, _forceConvergeTimer: 0,
            _zenithCalibDone: false, _zenithRef: { pitch: Math.PI/2, roll: 0 },
            _darkDone: false, _darkFrame: null, _darkCapturing: false, _darkBuf: [],
            _homoDone: false, _homoMatrix: null, _threePoints: [],
            _arCtx: null, _arW: 0, _arH: 0,
            _darkLastFrameTS: 0,
            _compassAlpha_rad: 0,
            _compassReceived: false,
            _compassOrientationHandler: null
        };

        state._hardClamp = (v, min, max, fb=0) => (!isFinite(v) || isNaN(v)) ? fb : Math.min(max, Math.max(min, v));
        state._computePhi = () => (state.stacks**2 + (state.aqi/10)**2 + state.far**2 + state.gss**2 + state.tcf**2);

        function updateFusion(e){
            const a = e.accelerationIncludingGravity, r = e.rotationRate;
            if(!a || !r || state._finalized) return;
            if(state._sensorFail){
                state._noiseBuf = [];
                state._gyroBias = 0;
                state.gyro_mag_degs = 0;
            }
            state._sensorFail = false;
            const accMag = Math.sqrt((a.x||0)**2 + (a.y||0)**2 + (a.z||0)**2);
            if(accMag < 0.2){ state.orientation.roll *= 0.98; state.orientation.pitch *= 0.98; return; }
            state._sensorTimeout = 0;
            const scale = (Math.abs(r.alpha||0) > 50) ? 0.0174533 : 1.0;
            const correctedG = Math.sqrt(((r.beta||0)**2 + (r.gamma||0)**2 + (r.alpha||0)**2)*scale/3);
            state._noiseBuf.push(correctedG); if(state._noiseBuf.length > 30) state._noiseBuf.shift();
            // [FIX17-04] バイアス推定開始条件をlength>20→length>10に緩和
            // センサー復帰後（bufクリア後）の空白期間を半減させる
            // length=10以上あれば平均値の信頼性は実用上十分
            if(state._noiseBuf.length > 10){
                const avg = state._noiseBuf.reduce((a,b)=>a+b,0) / state._noiseBuf.length;
                // [FIX16-06] gyroBias EMAアルファ：0.0001→0.005に修正
                // 旧値0.0001：センサー50Hz×更新時定数=1/(50×0.0001)=200秒（実用3〜4分）
                // 新値0.005：時定数=1/(50×0.005)=4秒（観測開始前ウォームアップ内で収束）
                state._gyroBias += (avg - state._gyroBias) * 0.005;
                state._gyroBias = state._hardClamp(state._gyroBias, -0.5, 0.5);
            }
            if(state._noiseBuf.length > 15){
                const sorted = [...state._noiseBuf].sort((x,y)=>x-y);
                state.gyro_mag_degs = state._hardClamp(sorted[Math.floor(sorted.length/2)] - state._gyroBias, 0, 10);
            }
            const mag = accMag || 1;
            state.orientation.roll  = Math.atan2(a.y/mag, a.z/mag + _EPS_ZERO);
            state.orientation.pitch = Math.atan2(-a.x/mag, Math.sqrt((a.y/mag)**2 + (a.z/mag)**2) + _EPS_ZERO);
        }

        function loop(ts){
            if(state._finalized) return;
            if(state._sensorWarmup < 30){ state._sensorWarmup++; requestAnimationFrame(loop); return; }
            state._sensorWarmup = 30;
            state._uiFrame = state._uiFrame === 0 ? 1 : 0;
            if(state._uiFrame !== 0) { if(!state._finalized) requestAnimationFrame(loop); return; }
            if(!state.isExposing) return;

            const now = performance.now();
            let rawDt = (now - state._lastRAF) / 1000; state._lastRAF = now;
            state._forceConvergeTimer += rawDt;
            state._dtHistory.push(rawDt); if(state._dtHistory.length > 20) state._dtHistory.shift();
            state._dtFinal = state._hardClamp(state._dtHistory.reduce((a,b)=>a+b,0) / (state._dtHistory.length || 1), 0.008, 0.05, 0.016);
            
            state._sensorTimeout += state._dtFinal;
            if(state._sensorTimeout > 0.5) state._sensorFail = true;

            const alpha = state._dtFinal / (0.12 + state._dtFinal);
            state.orientationLPF.roll += (state.orientation.roll - state.orientationLPF.roll) * alpha;
            state.orientationLPF.pitch += (state.orientation.pitch - state.orientationLPF.pitch) * alpha;
            const alpha2 = state._dtFinal / (0.25 + state._dtFinal);
            state._orientationLPF2.roll += (state.orientationLPF.roll - state._orientationLPF2.roll) * alpha2;
            state._orientationLPF2.pitch += (state.orientationLPF.pitch - state._orientationLPF2.pitch) * alpha2;

            const p = state._orientationLPF2.pitch, r = state._orientationLPF2.roll;
            const nz = Math.sin(p) * Math.cos(r);
            state.zenith_err = Math.acos(state._hardClamp(nz, -1+1e-9, 1-1e-9)) * 57.29577951;

            if(state._zenithCalibDone){
                const dp = state._orientationLPF2.pitch - state._zenithRef.pitch;
                const dr = state._orientationLPF2.roll  - state._zenithRef.roll;
                const nzCal = Math.sin(dp + Math.PI/2) * Math.cos(dr);
                state.zenith_err = Math.acos(state._hardClamp(nzCal, -1+1e-9, 1-1e-9)) * 57.29577951;
            }

            if(!state._sensorFail){
                state.tcf = state._hardClamp(Math.max(0.001, Math.cos(state.zenith_err * Math.PI / 180)), 0, 1);
                if(state.tcf > 0.999) state.tcf = 1.0;
                state.gss = state._hardClamp(Math.exp(-Math.max(0, state.gyro_mag_degs) / (PHYS.gyro_limit_degs + _EPS_ZERO)), 0, 1);
                if(state.gss > 0.999) state.gss = 1.0;
            } else {
                state.gss *= Math.exp(-state._dtFinal / 20.0);
                state.tcf *= Math.exp(-state._dtFinal / 20.0);
            }

            state.far += 1.6 * state.far * (1.0 - state.far) * state._dtFinal;
            if(state.far > 0.999) state.far = 1.0;

            if(state._darkCapturing){
                const nowTS = performance.now();
                if(nowTS - state._darkLastFrameTS >= 33.3){
                    state._darkLastFrameTS = nowTS;
                    const vc = document.getElementById('webcam');
                    const dc = document.createElement('canvas'); dc.width = 64; dc.height = 64;
                    const dx = dc.getContext('2d'); dx.drawImage(vc, 0, 0, 64, 64);
                    const id = dx.getImageData(0, 0, 64, 64);
                    state._darkBuf.push(new Float32Array(id.data));
                    if(state._darkBuf.length >= 30){
                        state._darkCapturing = false;
                        const df = new Float32Array(64*64*4);
                        for(let i=0;i<df.length;i++){
                            let s=0; for(let f=0;f<state._darkBuf.length;f++) s+=state._darkBuf[f][i];
                            df[i] = s / 30;
                        }
                        state._darkFrame = df; state._darkDone = true; state._darkBuf = [];
                        document.getElementById('dark-status').innerText = 'DARK_FRAME: 取得完了';
                        document.getElementById('progress-bar').style.width = '100%';
                    } else {
                        const pct = (state._darkBuf.length / 30 * 100).toFixed(0);
                        document.getElementById('progress-bar').style.width = pct + '%';
                        document.getElementById('dark-status').innerText = `取得中: ${state._darkBuf.length}/30`;
                    }
                }
            }

            const gate = (state.gss > 0.6 && state.tcf > 0.6 && !state._sensorFail);
            if(gate){
                const energy = state.far * state.gss * state.tcf;
                state.stacks += energy * (1.0 - state.stacks / PHYS.target_stacks) / (1.0 + state.stacks * 0.002) * state._dtFinal;
            }
            if(state.stacks > PHYS.target_stacks) state.stacks = PHYS.target_stacks;

            state.aqi = state._hardClamp((state.far * 0.5 + Math.pow(state.gss,2) * 0.25 + Math.pow(state.tcf,2) * 0.25) * 100, 0, 100);
            const phiNorm = state._computePhi() / (1.0 + state.stacks * 0.02);
            const phiDiff = Math.abs(phiNorm - state._prevPhiNorm);
            const phiRel  = phiDiff / (Math.abs(phiNorm) + _EPS_ZERO);
            if(phiDiff < 5e-9 || phiRel < 1e-7){
                state._stableCounter++;
                if(state._stableCounter > 10000) state._stableCounter = 10000;
            } else {
                state._stableCounter = 0;
            }
            state._prevPhiNorm = phiNorm;

            if( (state._stableCounter > 240 && state.stacks === PHYS.target_stacks) || state._forceConvergeTimer > 45 ) state._quantumLocked = true;
            if(state._quantumLocked){ state.stacks = PHYS.target_stacks; state.aqi = 100; }

            const zSafe = state._hardClamp(state.zenith_err, 0, 89.9);
            state._airmassSafe = state._hardClamp(1.0 / (Math.cos(zSafe*Math.PI/180) + 0.50572 * Math.pow(96.07995 - zSafe, -1.6364)), 1.0, 38.0);
            const rawSQM = state._hardClamp(PHYS.sqm_site_est - 0.20 * (state._airmassSafe - 1.0), 15.0, 22.0);
            
            state._sqmDynamic = rawSQM - Math.sign(rawSQM - state._prevSQM) * Math.min(Math.abs(rawSQM - state._prevSQM), 0.02);
            state._prevSQM = state._sqmDynamic;

            if(state._darkDone && !state._sensorFail && !state._quantumLocked){
                const vc = document.getElementById('webcam');
                const sc = document.createElement('canvas'); sc.width = 64; sc.height = 64;
                const sx = sc.getContext('2d'); sx.drawImage(vc, 0, 0, 64, 64);
                const sid = sx.getImageData(0, 0, 64, 64);
                let lum = 0;
                for(let i=0; i<sid.data.length; i+=4){
                    const r = Math.max(0, sid.data[i] - state._darkFrame[i]);
                    const g = Math.max(0, sid.data[i+1] - state._darkFrame[i+1]);
                    const b = Math.max(0, sid.data[i+2] - state._darkFrame[i+2]);
                    lum += 0.299*r + 0.587*g + 0.114*b;
                }
                lum /= (64*64*255);
                if(lum > _EPS_LOG){
                    const SQM_ZERO = PHYS.sqm_site_est - 2.5 * Math.log10(Math.PI);
                    const sqmFromImage = state._hardClamp(-2.5 * Math.log10(lum) + SQM_ZERO, 15.0, 22.0);
                    state._sqmDynamic = state._sqmDynamic * 0.9 + sqmFromImage * 0.1;
                }
            }
            if(state._quantumLocked){
                state._sqmDynamic = PHYS.sqm_site_est;
                state._prevSQM = PHYS.sqm_site_est;
            }

            drawAR();
            document.getElementById('val-axi').innerText = state.aqi.toFixed(1);
            document.getElementById('val-sqm').innerText = state._sqmDynamic.toFixed(2);
            document.getElementById('val-stacks').innerText = state.stacks.toFixed(2);
            document.getElementById('gate-status').innerText = state._quantumLocked ? "QUANTUM_LOCKED" : (gate ? "GATE_OPEN" : "GATE_CLOSED");
            
            const compassStr = (!state._compassReceived)
                ? 'COMPASS: --° (NO_DATA)'
                : `COMPASS: ${(state._compassAlpha_rad * 57.3).toFixed(0)}°`;
            document.getElementById('raw-stream').innerText =
                `ZENITH: ${state.zenith_err.toFixed(2)}°\nAIRMASS: ${state._airmassSafe.toFixed(2)}\n${compassStr}`;

            if(state._quantumLocked && Math.abs(state.stacks - PHYS.target_stacks) < 1e-6) finalize();
            else if(!state._finalized) requestAnimationFrame(loop);
        }

        function finalize(){
            if(state._finalized) return; state._finalized = true;
            window.removeEventListener('devicemotion', updateFusion);
            if(state._compassOrientationHandler){
                window.removeEventListener('deviceorientation', state._compassOrientationHandler);
            }
            document.getElementById('final-cert-text').innerHTML = `AQI: 100.00%<br>STACKS: ${PHYS.target_stacks}.00s<br>RESULT: STABLE_INTEGRITY_LOCK`;
            document.getElementById('evidence-overlay').style.display = 'flex';
            if(state._arCtx) state._arCtx.clearRect(0, 0, state._arW, state._arH);
        }

        async function initializeSystem(){
            document.getElementById('boot-screen').style.display = 'none';
            if(typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') await DeviceMotionEvent.requestPermission();
            if(typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function'){
                try { await DeviceOrientationEvent.requestPermission(); } catch(e){}
            }
            try {
                const s = await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
                document.getElementById('webcam').srcObject = s; document.getElementById('webcam').style.display = 'block';
            } catch(e){}
            state.isExposing = true;
            window.addEventListener('devicemotion', updateFusion);
            
            state._compassOrientationHandler = function(e){
                if(e.alpha !== null && isFinite(e.alpha)){
                    state._compassAlpha_rad = e.alpha * Math.PI / 180.0;
                    state._compassReceived = true;
                }
            };
            window.addEventListener('deviceorientation', state._compassOrientationHandler);

            document.getElementById('ar-hud').style.display = 'block';
            document.getElementById('ctrl-btns').style.display = 'block';
            const arc = document.getElementById('ar-canvas');
            arc.width = window.innerWidth; arc.height = window.innerHeight;
            state._arCtx = arc.getContext('2d'); state._arW = arc.width; state._arH = arc.height;

            const sel = document.getElementById('star-select');
            STAR_CATALOG.forEach(s => {
                const op = document.createElement('option'); op.value = s.name; op.innerText = s.name; sel.appendChild(op);
            });

            if(navigator.geolocation){
                navigator.geolocation.getCurrentPosition(pos => {
                    SITE.lat_deg = pos.coords.latitude;
                    SITE.lng_deg = pos.coords.longitude;
                    SITE._lat_rad = SITE.lat_deg * Math.PI / 180;
                    // [FIX17-05] 磁気偏角の簡易概算更新（Geolocation取得後）
                    // 正確な値はオンラインAPIが必要だが、簡易近似式で地域差を補正
                    // 参考：IGRF-13モデルの一次近似（日本近傍）
                    // 東京(35.7N,139.7E)≈-7.0°、札幌(43N,141E)≈-8.5°、那覇(26N,128E)≈-4.5°
                    // 緯度・経度から1次線形補間で概算（精度±1°程度）
                    const lat = SITE.lat_deg;
                    const lng = SITE.lng_deg;
                    // 日本近傍の簡易係数（lat: +0.05deg/deg北、lng: -0.02deg/deg東）
                    const mag_decl_approx = -7.0 + (lat - 35.7) * 0.05 + (lng - 139.7) * (-0.02);
                    SITE._mag_decl_rad = mag_decl_approx * Math.PI / 180;
                });
            }
            requestAnimationFrame(loop);
        }

        function execZenithCalib(){
            state._zenithRef.pitch = state._orientationLPF2.pitch;
            state._zenithRef.roll  = state._orientationLPF2.roll;
            state._zenithCalibDone = true;
            document.getElementById('calib-status').innerText =
                `ZENITH_SET: pitch=${(state._zenithRef.pitch*57.296).toFixed(2)}° roll=${(state._zenithRef.roll*57.296).toFixed(2)}°`;
        }

        function execDarkCapture(){
            state._darkBuf = [];
            state._darkDone = false;
            state._darkCapturing = true;
            state._darkLastFrameTS = 0;
        }
        
        function registerStar(){
            if(state._threePoints.length >= 3) return;
            const star = STAR_CATALOG.find(s => s.name === document.getElementById('star-select').value);
            if(!star) return;
            // [FIX17-02] az_correctedにmag_decl補正を追加
            // FIX16-08でcompassTrue = compassAlpha + mag_declを導入したが
            // 星登録ではcompassAlphaのみで補正しており基準不一致が生じていた
            // 星座線描画と同じcompassTrue基準に統一する
            const compassTrue = state._compassAlpha_rad + SITE._mag_decl_rad;
            const az_corrected = state._orientationLPF2.roll - compassTrue;
            state._threePoints.push({
                name: star.name, ra: star.ra, dec: star.dec,
                pitch: state._orientationLPF2.pitch,
                az_rad: az_corrected
            });
            document.getElementById('three-log').innerText = `登録済み: ${state._threePoints.length}/3 [${state._threePoints.map(p=>p.name).join(', ')}]`;
        }

        function computeHomography(){
            if(state._threePoints.length < 3) return;
            const pts = state._threePoints; const A = [], bx = [], by = [];
            for(let i=0;i<3;i++){
                const p = pts[i].pitch;
                const az = pts[i].az_rad;
                const sx = (az / (FOV_H_RAD * 0.5) + 1) * 0.5 * state._arW;
                const sy = (1 - p / (FOV_V_RAD * 0.5)) * 0.5 * state._arH;
                A.push([p, az, 1, 0, 0, 0]); A.push([0, 0, 0, p, az, 1]); bx.push(sx); by.push(sy);
            }
            const solve = (mat, b) => {
                for(let i=0;i<3;i++){
                    let max=i; for(let j=i+1;j<3;j++) if(Math.abs(mat[j][i])>Math.abs(mat[max][i])) max=j;
                    [mat[i],mat[max]]=[mat[max],mat[i]]; [b[i],b[max]]=[b[max],b[i]];
                    for(let j=i+1;j<3;j++){
                        const pivot = mat[i][i];
                        if(Math.abs(pivot) < _EPS_ZERO) continue;
                        const f=mat[j][i]/pivot; for(let k=i;k<3;k++) mat[j][k]-=f*mat[i][k]; b[j]-=f*b[i];
                    }
                }
                const res=[0,0,0]; for(let i=2;i>=0;i--){
                    res[i]=b[i]; for(let j=i+1;j<3;j++) res[i]-=mat[i][j]*res[j];
                    res[i] /= (Math.abs(mat[i][i]) < _EPS_ZERO ? _EPS_ZERO : mat[i][i]);
                } return res;
            };
            const abc = solve(
                [[A[0][0],A[0][1],A[0][2]],
                 [A[2][0],A[2][1],A[2][2]],
                 [A[4][0],A[4][1],A[4][2]]],
                [bx[0],bx[1],bx[2]]
            );
            const def = solve(
                [[A[1][3],A[1][4],A[1][5]],
                 [A[3][3],A[3][4],A[3][5]],
                 [A[5][3],A[5][4],A[5][5]]],
                [by[0],by[1],by[2]]
            );
            state._homoMatrix = { a:abc[0], b:abc[1], c:abc[2], d:def[0], e:def[1], f:def[2] };
            state._homoDone = true; document.getElementById('three-status').innerText = 'COMPUTED';
        }

        function sensorToScreen(pitch, az_rad){
            if(state._homoDone && state._homoMatrix){
                const m = state._homoMatrix;
                return { x: m.a*pitch + m.b*az_rad + m.c, y: m.d*pitch + m.e*az_rad + m.f };
            }
            // [FIX15-04] FOV_H_RAD/FOV_V_RAD：モジュールスコープの定数を使用（重複定義除去）
            return {
                x: (az_rad / (FOV_H_RAD * 0.5) + 1) * 0.5 * state._arW,
                y: (1 - pitch / (FOV_V_RAD * 0.5)) * 0.5 * state._arH
            };
        }

        function drawAR(){
            const ctx = state._arCtx; if(!ctx) return;
            ctx.clearRect(0, 0, state._arW, state._arH);
            const cx = state._arW/2, cy = state._arH/2;
            ctx.save(); ctx.strokeStyle = 'rgba(0,170,255,0.15)'; ctx.lineWidth = 1;
            ctx.setLineDash([4,8]); ctx.font = '8px Courier New'; ctx.fillStyle = 'rgba(0,170,255,0.4)';
            for(let el=0; el<=90; el+=15){
                const pos = sensorToScreen(el*Math.PI/180, 0);
                const radius = Math.abs(cy - pos.y);
                ctx.beginPath(); ctx.arc(cx, cy, radius, 0, Math.PI*2); ctx.stroke();
                const labelY = cy - Math.max(radius, 12) + 10;
                ctx.fillText(`${el}°`, cx+4, labelY);
            }
            ctx.restore();

            const zRoll = state._zenithCalibDone ? state._zenithRef.roll : 0;
            const compassTrue = state._compassAlpha_rad + SITE._mag_decl_rad;
            // [FIX17-03] compassReceived未チェック対応
            // compass未受信時はグリッドを薄く描画してNO_DATA状態を視覚的に明示
            ctx.save();
            ctx.strokeStyle = state._compassReceived
                ? 'rgba(0,170,255,0.10)'
                : 'rgba(0,170,255,0.04)';
            ctx.lineWidth = 1;
            ctx.setLineDash([3, 9]);
            ctx.font = '7px Courier New';
            ctx.fillStyle = state._compassReceived
                ? 'rgba(0,170,255,0.35)'
                : 'rgba(0,170,255,0.15)';
            for(let az = 0; az < 360; az += 30){
                const az_rad_screen = (az * Math.PI / 180) - Math.PI - compassTrue;
                const outerPos = sensorToScreen(0, az_rad_screen);
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.lineTo(outerPos.x, outerPos.y);
                ctx.stroke();
                const labelMap = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW'];
                const labelIdx = Math.round(az / 30) % 12;
                const lx = cx + (outerPos.x - cx) * 0.88;
                const ly = cy + (outerPos.y - cy) * 0.88;
                ctx.fillText(labelMap[labelIdx] || `${az}°`, lx - 8, ly + 4);
            }
            ctx.restore();

            const zPos = sensorToScreen(
                state._zenithCalibDone ? state._zenithRef.pitch : Math.PI/2,
                zRoll - compassTrue
            );
            ctx.save();
            ctx.strokeStyle = state._zenithCalibDone ? '#00ffff' : 'rgba(0,255,255,0.4)';
            ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.arc(zPos.x, zPos.y, 18, 0, Math.PI*2); ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(zPos.x - 24, zPos.y); ctx.lineTo(zPos.x + 24, zPos.y);
            ctx.moveTo(zPos.x, zPos.y - 24); ctx.lineTo(zPos.x, zPos.y + 24);
            ctx.stroke();
            ctx.fillStyle = state._zenithCalibDone ? '#00ffff' : 'rgba(0,255,255,0.4)';
            ctx.font = '8px Courier New';
            ctx.fillText(state._zenithCalibDone ? 'ZENITH(CAL)' : 'ZENITH', zPos.x + 22, zPos.y - 6);
            ctx.restore();

            if(state._threePoints.length > 0){
                ctx.save();
                ctx.strokeStyle = '#ffaa00';
                ctx.fillStyle   = '#ffaa00';
                ctx.lineWidth   = 1.5;
                ctx.font        = '8px Courier New';
                state._threePoints.forEach((pt, i) => {
                    const sp = sensorToScreen(pt.pitch, pt.az_rad);
                    ctx.beginPath();
                    ctx.arc(sp.x, sp.y, 10, 0, Math.PI*2);
                    ctx.stroke();
                    ctx.fillText(`[${i+1}]${pt.name}`, sp.x + 13, sp.y + 4);
                });
                ctx.restore();
            }

            const LST_cached = getLocalSiderealTime();
            ctx.save(); ctx.strokeStyle = 'rgba(255,255,100,0.25)'; ctx.lineWidth = 1; ctx.setLineDash([3,6]); ctx.font = '8px Courier New';
            CONSTELLATION_LINES.forEach(pair => {
                const s1 = STAR_CATALOG.find(s=>s.name===pair[0]); const s2 = STAR_CATALOG.find(s=>s.name===pair[1]);
                if(!s1||!s2) return;
                const h1 = equatorialToHorizontalWithLST(s1.ra, s1.dec, LST_cached);
                const h2 = equatorialToHorizontalWithLST(s2.ra, s2.dec, LST_cached);
                if(h1.alt_rad < 0 && h2.alt_rad < 0) return;
                const az1_orig = h1.az_rad - Math.PI - compassTrue;
                const az2_orig = h2.az_rad - Math.PI - compassTrue;
                let a1 = h1.alt_rad, az1 = az1_orig;
                let a2 = h2.alt_rad, az2 = az2_orig;
                if(h1.alt_rad < 0){
                    const t = h2.alt_rad / (h2.alt_rad - h1.alt_rad);
                    a1  = 0;
                    az1 = az2_orig + t * (az1_orig - az2_orig);
                }
                if(h2.alt_rad < 0){
                    const t = h1.alt_rad / (h1.alt_rad - h2.alt_rad);
                    a2  = 0;
                    az2 = az1_orig + t * (az2_orig - az1_orig);
                }
                const p1 = sensorToScreen(a1, az1);
                const p2 = sensorToScreen(a2, az2);
                ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
                if(h1.alt_rad >= 0){
                    ctx.fillStyle = 'rgba(255,255,100,0.5)'; ctx.fillText(s1.name, p1.x+6, p1.y-4);
                }
            }); ctx.restore();

            if(state.zenith_err > 2.0){
                const tPos = zPos, dx = tPos.x-cx, dy = tPos.y-cy, dist = Math.sqrt(dx*dx+dy*dy)||1;
                const arrowL = Math.min(60, Math.max(0, dist - 30));
                if(arrowL > 10){
                    const ux = dx/dist, uy = dy/dist;
                    const ax = cx + ux*arrowL, ay = cy + uy*arrowL;
                    const ang = Math.atan2(uy, ux);
                    ctx.save();
                    ctx.strokeStyle = '#00ff00';
                    ctx.fillStyle   = '#00ff00';
                    ctx.lineWidth   = 2;
                    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(ax, ay); ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(ax, ay);
                    ctx.lineTo(ax - 10*Math.cos(ang - 0.4), ay - 10*Math.sin(ang - 0.4));
                    ctx.lineTo(ax - 10*Math.cos(ang + 0.4), ay - 10*Math.sin(ang + 0.4));
                    ctx.closePath();
                    ctx.fill();
                    ctx.font = '9px Courier New';
                    ctx.fillText(`${state.zenith_err.toFixed(1)}°`, cx + ux*arrowL*0.5 + 5, cy + uy*arrowL*0.5);
                    ctx.restore();
                }
            }
        }

        function resetThreePoints(){
            state._threePoints = []; state._homoDone = false; state._homoMatrix = null;
            document.getElementById('three-log').innerText = '登録済み: 0/3';
            document.getElementById('three-status').innerText = '星をカメラ中央に入れて星名を選択し [ REGISTER ] を押してください';
        }

        function openPanel(id){ ['calib-panel','dark-panel','three-panel'].forEach(p => document.getElementById(p).style.display = (p===id)?'block':'none'); }
        function closePanel(id){ document.getElementById(id).style.display = 'none'; }

        window.addEventListener('DOMContentLoaded', ()=>{
            const logs = [">> ASTRONEX FULL_CALIBRATION FIX17", ">> REGISTER_AZ: MAG_DECL_UNIFIED", ">> GRID: COMPASS_RECV_CHECK", ">> GYRO_BIAS: BUF_THR_10", ">> MAG_DECL: GEO_APPROX_UPDATE", ">> TYPO: BENGALI_FIXED"];
            let i=0; const itv=setInterval(()=>{
                document.getElementById('kernel-log').innerHTML += logs[i++] + "<br>";
                if(i>=logs.length){ clearInterval(itv); document.getElementById('boot-ctrl').style.display='block'; }
            },50);
        });
    </script>
</body>
